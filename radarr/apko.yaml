contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-baselayout
    - ca-certificates-bundle
    - glibc
    - glibc-locale-posix
    - icu
    - ld-linux
    - libcrypto3
    - libgcc
    - libssl3
    - libstdc++
    - libunwind
    - libxcrypt
    - lttng-ust
    - sqlite-libs
    - tzdata
    - zlib
    - radarr

accounts:
  groups:
    - groupname: nonroot
      gid: 65532
  users:
    - username: nonroot
      uid: 65532
      gid: 65532
  run-as: "65532"

entrypoint:
  command: /opt/radarr/Radarr

cmd: -nobrowser -data=/radarr/etc

work-dir: /

paths:
  - path: /radarr/etc
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /tmp
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o1777

annotations:
  org.opencontainers.image.title: "radarr"
  org.opencontainers.image.description: "Hardened Radarr image built on Wolfi with daily CVE patches"
  org.opencontainers.image.url: "https://github.com/vegops/containers"
  org.opencontainers.image.source: "https://github.com/vegops/containers/tree/main/radarr"
  org.opencontainers.image.licenses: "GPL-3.0"

archs:
  - x86_64
  - aarch64

layering:
  strategy: origin
