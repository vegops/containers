package:
  name: prometheus-minimal
  version: 3.11.2
  epoch: 0
  description: "Minimal Prometheus monitoring server built from source"
  copyright:
    - license: Apache-2.0

environment:
  environment:
    CGO_ENABLED: "0"
  contents:
    repositories:
      - &wolfi-repository https://packages.wolfi.dev/os
    keyring:
      - &wolfi-keyring https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/prometheus/prometheus
      tag: v${{package.version}}

  - runs: |
      go build \
        -trimpath \
        -ldflags="-s -w \
          -X github.com/prometheus/common/version.Version=${{package.version}} \
          -X github.com/prometheus/common/version.Branch=HEAD \
          -X github.com/prometheus/common/version.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
          -X github.com/prometheus/common/version.BuildUser=vegops" \
        -o prometheus \
        ./cmd/prometheus

      # Build promtool
      go build \
        -trimpath \
        -ldflags="-s -w \
          -X github.com/prometheus/common/version.Version=${{package.version}}" \
        -o promtool \
        ./cmd/promtool

  - runs: |
      install -Dm755 prometheus "${{targets.destdir}}/usr/bin/prometheus"
      install -Dm755 promtool "${{targets.destdir}}/usr/bin/promtool"

  - runs: |
      # Default configuration file
      mkdir -p "${{targets.destdir}}/etc/prometheus"
      cp ./etc/prometheus.yml "${{targets.destdir}}/etc/prometheus/prometheus.yml"

update:
  enabled: true
  github:
    identifier: prometheus/prometheus
    use-tag: true
    tag-filter: "v3."
    strip-prefix: "v"

test:
  environment:
    contents:
      repositories:
        - *wolfi-repository
      keyring:
        - *wolfi-keyring
      packages:
        - apk-tools
        - busybox
        - posix-libc-utils
        - ${{package.name}}=${{package.full-version}}
  pipeline:
    - name: Basic command test
      runs: |
        prometheus --version >/dev/null 2>&1
        promtool --version >/dev/null 2>&1
