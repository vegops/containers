contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-baselayout
    - ca-certificates-bundle
    - python-3.14 # FulcrumAdmin requires Python 3 to run
    - tzdata
    - fulcrum

accounts:
  groups:
    - groupname: nonroot
      gid: 65532
  users:
    - username: nonroot
      uid: 65532
      gid: 65532
  run-as: "65532"

entrypoint:
  command: /usr/bin/entrypoint

work-dir: /

environment:
  LANG: C.UTF-8

volumes:
  - /fulcrum/etc
  - /fulcrum/var

paths:
  - path: /fulcrum
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /fulcrum/etc
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /fulcrum/var
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /fulcrum/run
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700

annotations:
  org.opencontainers.image.title: "fulcrum"
  org.opencontainers.image.description: "Hardened Fulcrum image built on Wolfi with daily CVE patches"
  org.opencontainers.image.url: "https://github.com/vegops/containers"
  org.opencontainers.image.source: "https://github.com/vegops/containers/tree/main/fulcrum"
  org.opencontainers.image.licenses: "GPL-3.0"

archs:
  - x86_64
  - aarch64

layering:
  strategy: origin
