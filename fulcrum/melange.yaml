package:
  name: fulcrum
  version: 2.1.0
  epoch: 0
  description: Fulcrum SPV server
  copyright:
    - license: GPL-3.0

environment:
  contents:
    repositories:
      - &wolfi-repository https://packages.wolfi.dev/os
    keyring:
      - &wolfi-keyring https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    packages:
      - busybox
      - build-base
      - jemalloc-dev
      - lz4-dev
      - openssl-static
      - pkgconf
      - qt-minimal
      - rocksdb
      - snappy-dev
      - zeromq-dev
      - zlib-dev
      - zstd-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/cculianu/Fulcrum
      tag: v${{package.version}}

  - runs: |
      /usr/bin/qmake -makefile \
        PREFIX=/usr \
        Fulcrum.pro \
        "CONFIG-=debug" \
        "CONFIG+=release" \
        "LIBS+=-L/usr/lib -lrocksdb -lz -ljemalloc -lzmq -lzstd -llz4 -lsnappy" \
        "INCLUDEPATH+=/usr/include"

      make -j "$(nproc)"

      mkdir -p "${{targets.destdir}}/usr/bin"
      cp Fulcrum "${{targets.destdir}}/usr/bin/Fulcrum"
      cp FulcrumAdmin "${{targets.destdir}}/usr/bin/FulcrumAdmin"

  - uses: strip

update:
  enabled: true
  github:
    identifier: cculianu/Fulcrum
    use-tag: true
    tag-filter-prefix: v2.
    strip-prefix: v

test:
  environment:
    contents:
      repositories:
        - *wolfi-repository
      keyring:
        - *wolfi-keyring
      packages:
        - apk-tools
        - busybox
        - posix-libc-utils
        - ${{package.name}}=${{package.full-version}}
        - python-3.14 # FulcrumAdmin requires Python 3 to run
  pipeline:
    - name: Basic Fulcrum command test
      runs: |
        Fulcrum --help >/dev/null 2>&1
        FulcrumAdmin --help >/dev/null 2>&1
