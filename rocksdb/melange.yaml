package:
  name: rocksdb
  version: 10.10.1
  epoch: 0
  description: RocksDB static library
  copyright:
    - license: Apache-2.0

environment:
  contents:
    repositories:
      - https://packages.wolfi.dev/os
    keyring:
      - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    packages:
      - bash
      - busybox
      - build-base
      - clang
      - git
      - linux-headers
      - make
      - perl
      - snappy-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/facebook/rocksdb.git
      tag: v${{package.version}}

  - runs: |
      sed 's/install -C/install -c/g' Makefile > _
      mv -f _ Makefile

      PORTABLE=1 \
      DISABLE_JEMALLOC=1 \
      DEBUG_LEVEL=0 \
      USE_RTTI=1 \
      make static_lib -j$(nproc)

      DESTDIR="${{targets.destdir}}" \
      PREFIX=/usr \
      make install-static

      strip --strip-unneeded "${{targets.destdir}}/usr/lib/librocksdb.a"

update:
  enabled: true
  github:
    identifier: facebook/rocksdb
    use-tag: true
    tag-filter-prefix: v10.10.
    strip-prefix: v
