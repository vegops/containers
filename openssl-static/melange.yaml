package:
  name: openssl-static
  version: 3.6.2 # renovate: datasource=github-tags depName=openssl/openssl
  epoch: 0
  description: OpenSSL static libraries
  copyright:
    - license: Apache-2.0

environment:
  contents:
    repositories:
      - &wolfi-repository https://packages.wolfi.dev/os
    keyring:
      - &wolfi-keyring https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    packages:
      - binutils
      - busybox
      - openssl-dev

pipeline:
  - name: Repack Wolfi OpenSSL development files
    runs: |
      mkdir -p "${{targets.destdir}}/usr/lib"
      cp -af /usr/lib/libssl.a    "${{targets.destdir}}/usr/lib"
      cp -af /usr/lib/libcrypto.a "${{targets.destdir}}/usr/lib"

      mkdir -p "${{targets.destdir}}/usr/include/openssl"
      cp -af /usr/include/openssl/* "${{targets.destdir}}/usr/include/openssl/"

      mkdir -p "${{targets.destdir}}/usr/lib/pkgconfig"
      cp -af /usr/lib/pkgconfig/libcrypto.pc \
             /usr/lib/pkgconfig/libssl.pc \
             /usr/lib/pkgconfig/openssl.pc \
             "${{targets.destdir}}/usr/lib/pkgconfig/"

      mkdir -p "${{targets.destdir}}/usr/lib/cmake/OpenSSL"
      cp -af /usr/lib/cmake/OpenSSL/* "${{targets.destdir}}/usr/lib/cmake/OpenSSL/"

  - runs: |
      # Keep this package self-contained for consumers that link directly
      # against /usr/lib/libcrypto.a without adding -ljitterentropy.
      tmpdir="$(mktemp -d)"
      cd "$tmpdir"
      ar x /usr/lib/libjitterentropy.a
      ar rcs "${{targets.destdir}}/usr/lib/libcrypto.a" *.o
      cd /
      rm -rf "$tmpdir"

      # libjitterentropy.a is merged above and is intentionally not shipped.
      sed -i 's/ -l:libjitterentropy\.a//g' \
        "${{targets.destdir}}/usr/lib/pkgconfig/libcrypto.pc" \
        "${{targets.destdir}}/usr/lib/cmake/OpenSSL/OpenSSLConfig.cmake"

  - uses: strip

update:
  enabled: true
  github:
    identifier: openssl/openssl
    use-tag: true
    tag-filter-prefix: openssl-3.6.
    strip-prefix: openssl-

test:
  environment:
    contents:
      repositories:
        - *wolfi-repository
      keyring:
        - *wolfi-keyring
      packages:
        - binutils
        - busybox
        - pkgconf
        - ${{package.name}}=${{package.full-version}}
  pipeline:
    - name: Check static-link development files
      runs: |
        test -f /usr/include/openssl/ssl.h
        test -f /usr/include/openssl/crypto.h
        test -s /usr/lib/libssl.a
        test -s /usr/lib/libcrypto.a
        test ! -e /usr/lib/libssl.so
        test ! -e /usr/lib/libcrypto.so
        test ! -e /usr/bin/openssl
        test -f /usr/lib/pkgconfig/libssl.pc || test -f /usr/lib/pkgconfig/openssl.pc
        test -f /usr/lib/cmake/OpenSSL/OpenSSLConfig.cmake
        pkgconf --exists libcrypto libssl openssl
        ! pkgconf --static --libs libcrypto | grep -q jitterentropy
        ! grep -q jitterentropy /usr/lib/cmake/OpenSSL/OpenSSLConfig.cmake
        nm -A /usr/lib/libcrypto.a | grep ' T jent_entropy_init_ex' >/dev/null
