package:
  name: seerr
  version: 3.3.0 # renovate: datasource=github-releases depName=seerr-team/seerr
  epoch: 3
  description: Media request manager for Jellyfin, Plex, Emby, Radarr, and Sonarr
  copyright:
    - license: MIT
  options:
    no-depends: true

environment:
  environment:
    NEXT_TELEMETRY_DISABLED: "1"
  contents:
    repositories:
      - &wolfi-repository https://packages.wolfi.dev/os
    keyring:
      - &wolfi-keyring https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    packages:
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - node-gyp
      - nodejs-22
      - npm
      - pnpm
      - py3.14-setuptools
      - python-3.14

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/seerr-team/seerr
      tag: v${{package.version}}

  - runs: |
      mkdir -p /home/build/.home
      rm -rf package
      mkdir -p package

      cp -a package.json pnpm-lock.yaml .npmrc bin package/

  - working-directory: package
    environment:
      HOME: /home/build/.home
      CI: "true"
    runs: |
      pnpm install --prod --frozen-lockfile

  - environment:
      HOME: /home/build/.home
      CI: "true"
      CYPRESS_INSTALL_BINARY: "0"
      COMMIT_TAG: "v${{package.version}}"
    runs: |
      pnpm install --frozen-lockfile
      pnpm build

      rm -rf .next/cache

  - runs: |
      mkdir -p "${{targets.destdir}}/opt/seerr"

      cp -a \
        .next \
        dist \
        next.config.ts \
        package.json \
        public \
        seerr-api.yml \
        "${{targets.destdir}}/opt/seerr/"
      cp -a package/node_modules "${{targets.destdir}}/opt/seerr/"

      printf '{"commitTag":"v%s"}\n' "${{package.version}}" \
        > "${{targets.destdir}}/opt/seerr/committag.json"

      rm -rf /home/build/.home package

  - uses: vegops/prune
    with:
      paths: /opt/seerr
      remove-empty-directories: "true"

update:
  enabled: true
  github:
    identifier: seerr-team/seerr
    use-tag: true
    strip-prefix: v

test:
  environment:
    contents:
      repositories:
        - *wolfi-repository
      keyring:
        - *wolfi-keyring
      packages:
        - busybox
        - nodejs-22
        - ${{package.name}}=${{package.full-version}}
  pipeline:
    - name: Basic Seerr package test
      runs: |
        test -f /opt/seerr/dist/index.js
        test -f /opt/seerr/package.json
        node -e "require('node:inspector'); require('/opt/seerr/node_modules/sqlite3'); require('/opt/seerr/node_modules/sharp'); const pkg = require('/opt/seerr/package.json'); if (pkg.version !== '${{package.version}}') process.exit(1)"
