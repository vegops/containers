contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-baselayout
    - ca-certificates-bundle
    - python3
    - sqlite-libs
    - tzdata
    - tautulli

accounts:
  groups:
    - groupname: nonroot
      gid: 65532
  users:
    - username: nonroot
      uid: 65532
      gid: 65532
  run-as: "65532"

entrypoint:
  command: /usr/bin/python3

cmd: >-
  /opt/tautulli/Tautulli.py
  --nolaunch
  --config /tautulli/etc/config.ini
  --datadir /tautulli/var

work-dir: /tautulli

environment:
  TAUTULLI_DOCKER: "True"

volumes:
  - /tautulli/etc
  - /tautulli/var

paths:
  - path: /tautulli
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /tautulli/etc
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /tautulli/var
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /tmp
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o1777

annotations:
  org.opencontainers.image.title: "tautulli"
  org.opencontainers.image.description: "Hardened Tautulli image built on Wolfi with daily CVE patches"
  org.opencontainers.image.url: "https://github.com/vegops/containers"
  org.opencontainers.image.source: "https://github.com/vegops/containers/tree/main/tautulli"
  org.opencontainers.image.licenses: "GPL-3.0-or-later"

archs:
  - x86_64
  - aarch64

layering:
  strategy: origin
