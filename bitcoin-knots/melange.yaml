package:
  name: bitcoin-knots
  version: 29.3.20260210 # renovate: datasource=github-tags depName=bitcoinknots/bitcoin
  epoch: 0
  description: Bitcoin Knots daemon
  copyright:
    - license: MIT

var-transforms:
  - from: ${{package.version}}
    match: ^([0-9]+)\.([0-9]+)\.([0-9]+)$
    replace: ${1}.${2}.knots${3}
    to: upstream-version

environment:
  environment:
    BITCOIN_GENBUILD_NO_GIT: "1"
  contents:
    repositories:
      - &wolfi-repository https://packages.wolfi.dev/os
    keyring:
      - &wolfi-keyring https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    packages:
      - busybox
      - build-base
      - cmake
      - linux-headers
      - pkgconf
      - libevent-dev
      - boost-dev
      - zeromq-dev
      - libzmq-static
      - gpg
      - gpg-agent
      - curl
      - jq

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/bitcoinknots/bitcoin.git
      tag: v${{vars.upstream-version}}

  - runs: |
      export GNUPGHOME="$(mktemp -d)"
      trap 'rm -rf "$GNUPGHOME"' EXIT

      curl -s "https://api.github.com/repos/bitcoinknots/guix.sigs/contents/builder-keys" | jq -r '.[].download_url' | while read url; do curl -s "$url" | gpg --import; done

      git verify-tag "v${{vars.upstream-version}}"

  - uses: cmake/configure
    with:
      opts: |
        -DCMAKE_BUILD_TYPE=Release \
        -DCMAKE_INSTALL_PREFIX=/usr \
        -DBUILD_BITCOIN_BIN=OFF \
        -DBUILD_DAEMON=ON \
        -DBUILD_GUI=OFF \
        -DBUILD_CLI=ON \
        -DBUILD_TX=ON \
        -DBUILD_UTIL=OFF \
        -DBUILD_UTIL_CHAINSTATE=OFF \
        -DBUILD_WALLET_TOOL=OFF \
        -DENABLE_WALLET=OFF \
        -DENABLE_IPC=OFF \
        -DENABLE_EXTERNAL_SIGNER=OFF \
        -DBUILD_TESTS=OFF \
        -DBUILD_GUI_TESTS=OFF \
        -DBUILD_BENCH=OFF \
        -DBUILD_FUZZ_BINARY=OFF \
        -DBUILD_FOR_FUZZING=OFF \
        -DBUILD_KERNEL_LIB=OFF \
        -DWITH_ZMQ=ON \
        -DWITH_USDT=OFF \
        -DWITH_QRENCODE=OFF \
        -DWITH_DBUS=OFF \
        -DREDUCE_EXPORTS=ON \
        -DWERROR=OFF \
        -DWITH_CCACHE=OFF \
        -DINSTALL_MAN=OFF

  - uses: cmake/build

  - runs: |
      mkdir -p "${{targets.destdir}}/usr/bin"
      cp build/bin/bitcoind "${{targets.destdir}}/usr/bin/bitcoind"
      cp build/bin/bitcoin-cli "${{targets.destdir}}/usr/bin/bitcoin-cli"
      cp build/bin/bitcoin-tx "${{targets.destdir}}/usr/bin/bitcoin-tx"

  - uses: strip

update:
  enabled: true
  github:
    identifier: bitcoinknots/bitcoin
    use-tag: true
    tag-filter-prefix: v29.3.knots
    strip-prefix: v
  version-transform:
    - match: \.knots
      replace: .

test:
  environment:
    contents:
      repositories:
        - *wolfi-repository
      keyring:
        - *wolfi-keyring
      packages:
        - apk-tools
        - busybox
        - posix-libc-utils
        - ${{package.name}}=${{package.full-version}}
  pipeline:
    - name: Basic bitcoin command test
      runs: |
        bitcoind --version >/dev/null 2>&1 || \
        bitcoind --help >/dev/null 2>&1
        bitcoin-cli --version >/dev/null 2>&1 || \
        bitcoin-cli --help >/dev/null 2>&1
        bitcoin-tx --version >/dev/null 2>&1 || \
        bitcoin-tx --help >/dev/null 2>&1
