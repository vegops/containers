package:
  name: chown
  version: 0.1.0
  epoch: 1
  description: Minimal chown for distroless containers
  copyright:
    - license: MIT

environment:
  contents:
    repositories:
      - &alpine-main-repository https://dl-cdn.alpinelinux.org/alpine/edge/main
      - &alpine-community-repository https://dl-cdn.alpinelinux.org/alpine/edge/community
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle

pipeline:
  - uses: dotnet/entrypoint
    with:
      sdk-package: dotnet10-sdk
      source: chown.cs
      rid-base: linux-musl
      output-name: chown
      install-path: /usr/bin/chown

  - uses: strip

update:
  enabled: false
  exclude-reason: Local utility built from in-repo source; there is no upstream release stream to track.

test:
  environment:
    contents:
      repositories:
        - *alpine-main-repository
        - *alpine-community-repository
      packages:
        - busybox
        - ${{package.name}}=${{package.full-version}}
  pipeline:
    - runs: |
        test -x /usr/bin/chown
