package:
  name: chown
  version: 0.1.0
  epoch: 0
  description: Minimal chown for distroless containers
  copyright:
    - license: MIT

environment:
  environment:
    DOTNET_CLI_TELEMETRY_OPTOUT: "1"
    DOTNET_NOLOGO: "true"
    DOTNET_GENERATE_ASPNET_CERTIFICATE: "0"
  contents:
    repositories:
      - &alpine-main-repository https://dl-cdn.alpinelinux.org/alpine/edge/main
      - &alpine-community-repository https://dl-cdn.alpinelinux.org/alpine/edge/community
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - dotnet10-sdk

pipeline:
  - runs: |
      arch="$(uname -m | sed 's/aarch64/arm64/;s/x86_64/x64/')"
      dotnet publish chown.cs -c Release -r "linux-musl-${arch}" -o .
      rm -rf .local

  - runs: |
      install -Dm755 chown "${{targets.destdir}}/usr/bin/chown"

  - uses: strip

test:
  environment:
    contents:
      repositories:
        - *alpine-main-repository
        - *alpine-community-repository
      packages:
        - busybox
        - ${{package.name}}=${{package.full-version}}
  pipeline:
    - runs: |
        /usr/bin/chown 2>&1 | grep -q "Usage"
        test -x /usr/bin/chown
