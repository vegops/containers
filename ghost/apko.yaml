contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-baselayout
    - ca-certificates-bundle
    - fontconfig
    - nodejs-22-minimal
    - sqlite-libs
    - tzdata
    - ghost

accounts:
  groups:
    - groupname: nonroot
      gid: 65532
  users:
    - username: nonroot
      uid: 65532
      gid: 65532
  run-as: "65532"

entrypoint:
  command: /usr/bin/node /opt/ghost/index.js

work-dir: /

volumes:
  - /ghost/log
  - /ghost/var

environment:
  NODE_ENV: production

paths:
  - path: /ghost/var
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /ghost/log
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /tmp
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o1777

annotations:
  org.opencontainers.image.title: "ghost"
  org.opencontainers.image.description: "Hardened Ghost image built on Wolfi with daily CVE patches"
  org.opencontainers.image.url: "https://github.com/vegops/containers"
  org.opencontainers.image.source: "https://github.com/vegops/containers/tree/main/ghost"
  org.opencontainers.image.licenses: "MIT"

archs:
  - x86_64
  - aarch64

layering:
  strategy: origin
