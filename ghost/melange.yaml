package:
  name: ghost
  version: 6.27.0 # renovate: datasource=npm depName=ghost
  epoch: 1
  description: Professional publishing platform
  copyright:
    - license: MIT
  options:
    no-depends: true

environment:
  environment:
    NODE_ENV: production
  contents:
    repositories:
      - &wolfi-repository https://packages.wolfi.dev/os
    keyring:
      - &wolfi-keyring https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - node-gyp
      - nodejs-22
      - npm
      - py3.14-setuptools
      - python-3.14
      - yarn

pipeline:
  - runs: |
      mkdir -p package
      npm pack "ghost@${{package.version}}" --silent
      tar -xzf "ghost-${{package.version}}.tgz" -C package --strip-components=1
      rm -f "ghost-${{package.version}}.tgz"

  - working-directory: package
    runs: |
      yarn install \
        --ignore-scripts \
        --production \
        --non-interactive \
        --prefer-offline

  - working-directory: package/node_modules/sqlite3
    runs: |
      npm run install

  - working-directory: package
    runs: |
      case "${{build.arch}}" in
        x86_64)  TARGETARCH="x64" ;;
        aarch64) TARGETARCH="arm64" ;;
      esac

      # Prune unnecessary files from node_modules
      npx --yes @usex/prune-mod@0.0.14 --verbose
      find node_modules -type d \( -name '*musl*' -o -name 'win64-bin' -o -name 'osx-bin' \) -prune -exec rm -rf {} +
      find node_modules -type f \( -name '*.dll' -o -name '*.exe' -o -name '*.node' -path '*musl*' \) -delete
      find node_modules -type d -path '*/prebuilds/*' ! -name "linux-${TARGETARCH}" -prune -exec rm -rf {} +

  - runs: |
      mkdir -p "${{targets.destdir}}/opt/ghost"
      cp -a package/. "${{targets.destdir}}/opt/ghost/"

  - runs: |
      mkdir -p "${{targets.destdir}}/${{package.name}}/log"
      mkdir -p "${{targets.destdir}}/${{package.name}}/var"
      ln -sf /${{package.name}}/var "${{targets.destdir}}/opt/ghost/content"
      ln -sf /${{package.name}}/log "${{targets.destdir}}/opt/ghost/log"

update:
  enabled: false
  exclude-reason: Package updates rely on npm tarballs, checksum refresh, and native module pruning handled by Renovate.

test:
  environment:
    contents:
      repositories:
        - *wolfi-repository
      keyring:
        - *wolfi-keyring
      packages:
        - busybox
        - ca-certificates-bundle
        - fontconfig
        - nodejs-22-minimal
        - sqlite-libs
        - tzdata
        - ${{package.name}}=${{package.full-version}}
  pipeline:
    - name: Basic Ghost package test
      runs: |
        test -f /opt/ghost/index.js
        test ! -e /opt/ghost/bin/ghost-entrypoint
        test ! -e /opt/ghost/config.production.json
        test -d /opt/ghost/content
        test -d /opt/ghost/log
        test -d /opt/ghost/core/built/admin

        cd /opt/ghost
        node -e "require('sqlite3'); require('sharp'); const pkg = require('./package.json'); if (pkg.version !== '${{package.version}}') process.exit(1)"
