name: Build Hardened Images

on:
  push:
    branches: [main]
    paths:
      - "*/apko.yaml"
      - "*/melange.yaml"
      - ".github/workflows/build.yaml"
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write
  actions: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY_HOST: ghcr.io
  REGISTRY_NAMESPACE: ghcr.io/${{ github.repository_owner }}
  MELANGE_VERSION: v0.46.1 # renovate: datasource=github-releases depName=chainguard-dev/melange
  APKO_VERSION: v1.1.16 # renovate: datasource=github-releases depName=chainguard-dev/apko
  MELANGE_SIGNING_KEY: ${{ secrets.MELANGE_SIGNING_KEY }}
  MELANGE_SIGNING_KEY_PUB: ${{ secrets.MELANGE_SIGNING_KEY_PUB }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MAX_DEP_TIER: 5

jobs:
  ##############################################################################
  # DISCOVER PACKAGES AND IMAGES TO BUILD (outputs for downstream jobs)        #
  ##############################################################################
  discover:
    runs-on: ubuntu-latest
    outputs:
      base_packages: ${{ steps.set.outputs.base_packages }}
      deps_tier_1: ${{ steps.set.outputs.deps_tier_1 }}
      deps_tier_2: ${{ steps.set.outputs.deps_tier_2 }}
      deps_tier_3: ${{ steps.set.outputs.deps_tier_3 }}
      deps_tier_4: ${{ steps.set.outputs.deps_tier_4 }}
      deps_tier_5: ${{ steps.set.outputs.deps_tier_5 }}
      apko_images: ${{ steps.set.outputs.apko_images }}
    steps:
      - uses: actions/checkout@v6

      - id: set
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t all_apko < <(find . -maxdepth 2 -name apko.yaml | sed 's|^\./||; s|/apko.yaml$||' | sort -u)
          mapfile -t all_melange < <(find . -maxdepth 2 -name melange.yaml | sed 's|^\./||; s|/melange.yaml$||' | sort -u)

          json_array() {
            if [ "$#" -eq 0 ]; then
              printf '[]'
            else
              printf '%s\n' "$@" | jq -R -s -c 'split("\n") | map(select(length > 0))'
            fi
          }

          declare -A deps_of
          for pkg in "${all_melange[@]}"; do
            pkg_deps=""
            for dep in "${all_melange[@]}"; do
              if [ "$pkg" != "$dep" ] && grep -E -q "^[[:space:]]+-[[:space:]]+${dep}(-.*)?(=.*)?$" "$pkg/melange.yaml"; then
                pkg_deps="$pkg_deps $dep"
              fi
            done
            deps_of["$pkg"]="${pkg_deps# }"
          done

          base_packages=()
          dep_packages=()
          for pkg in "${all_melange[@]}"; do
            if [ -n "${deps_of[$pkg]}" ]; then
              dep_packages+=("$pkg")
            else
              base_packages+=("$pkg")
            fi
          done

          declare -A resolved
          for pkg in "${base_packages[@]}"; do
            resolved["$pkg"]=1
          done

          sorted_deps=()
          remaining=("${dep_packages[@]}")
          max_iter=${#dep_packages[@]}
          iter=0

          while [ "${#remaining[@]}" -gt 0 ]; do
            ((iter += 1))
            if [ "$iter" -gt "$max_iter" ]; then
              echo "::error::Circular dependency: ${remaining[*]}"
              exit 1
            fi

            progress=false
            next=()
            for pkg in "${remaining[@]}"; do
              all_ok=true
              for dep in ${deps_of[$pkg]}; do
                if [ -z "${resolved[$dep]+x}" ]; then
                  all_ok=false
                  break
                fi
              done

              if [ "$all_ok" = true ]; then
                sorted_deps+=("$pkg")
                resolved["$pkg"]=1
                progress=true
              else
                next+=("$pkg")
              fi
            done

            if [ "$progress" = false ]; then
              echo "::error::Circular dependency: ${next[*]}"
              exit 1
            fi

            remaining=("${next[@]}")
          done

          MAX_TIERS=${{ env.MAX_DEP_TIER }}

          declare -A pkg_level
          for pkg in "${base_packages[@]}"; do
            pkg_level["$pkg"]=0
          done

          for i in $(seq 1 "$MAX_TIERS"); do
            declare -a "tier_$i=()"
          done

          for pkg in "${sorted_deps[@]}"; do
            max_dep_level=0
            for dep in ${deps_of[$pkg]}; do
              dep_lvl=${pkg_level[$dep]:-0}
              if [ "$dep_lvl" -gt "$max_dep_level" ]; then
                max_dep_level=$dep_lvl
              fi
            done

            level=$((max_dep_level + 1))
            if [ "$level" -gt "$MAX_TIERS" ]; then
              echo "::error::Package '$pkg' requires tier $level but max is $MAX_TIERS. Add more tier jobs to the workflow."
              exit 1
            fi

            pkg_level["$pkg"]=$level
            eval "tier_${level}+=(\"$pkg\")"
          done

          echo "base_packages=$(json_array "${base_packages[@]}")" >> "$GITHUB_OUTPUT"
          for i in $(seq 1 "$MAX_TIERS"); do
            eval "pkgs=(\"\${tier_${i}[@]}\")"
            echo "deps_tier_${i}=$(json_array "${pkgs[@]}")" >> "$GITHUB_OUTPUT"
          done
          echo "apko_images=$(json_array "${all_apko[@]}")" >> "$GITHUB_OUTPUT"

          echo "Base: ${base_packages[*]:-<none>}"
          for i in $(seq 1 "$MAX_TIERS"); do
            eval "pkgs=(\"\${tier_${i}[@]}\")"
            if [ "${#pkgs[@]}" -gt 0 ]; then
              echo "Deps tier $i: ${pkgs[*]}"
            fi
          done
          echo "Images: ${all_apko[*]:-<none>}"

  ##############################################################################
  # GENERATE EPHEMERAL SIGNING KEY (PR only - secrets not available for forks) #
  ##############################################################################
  keygen:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install melange
        uses: ./.github/actions/setup-tools
        with:
          melange-version: ${{ env.MELANGE_VERSION }}

      - name: Generate ephemeral signing key
        run: |
          echo "Generating ephemeral key for PR build (not used for publishing)"
          melange keygen

      - name: Upload signing key
        uses: actions/upload-artifact@v7
        with:
          name: melange-ephemeral-key
          path: |
            melange.rsa
            melange.rsa.pub
          retention-days: 1

  ##############################################################################
  # TIER 1: BUILD BASE MELANGE PACKAGES (no internal dependencies)             #
  ##############################################################################
  melange-build-base:
    needs: [discover, keygen]
    if: always() && needs.discover.outputs.base_packages != '[]' && needs.discover.outputs.base_packages != '[""]'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        name: ${{ fromJson(needs.discover.outputs.base_packages) }}
        arch: [x86_64, aarch64]

    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v6

      - name: Build package
        uses: ./.github/actions/melange-build
        with:
          package-name: ${{ matrix.name }}
          arch: ${{ matrix.arch }}
          event-name: ${{ github.event_name }}
          signing-key-secret: ${{ env.MELANGE_SIGNING_KEY }}
          signing-key-pub-secret: ${{ env.MELANGE_SIGNING_KEY_PUB }}
          melange-version: ${{ env.MELANGE_VERSION }}

  ##############################################################################
  # TIER 2+: BUILD DEPENDENT MELANGE PACKAGES (tiered by dependency depth)     #
  ##############################################################################
  melange-build-deps-tier-1:
    needs: [discover, keygen, melange-build-base]
    if: >-
      always()
      && needs.discover.outputs.deps_tier_1 != '[]'
      && needs.discover.outputs.deps_tier_1 != '[""]'
      && (needs.melange-build-base.result == 'success' || needs.melange-build-base.result == 'skipped')
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        name: ${{ fromJson(needs.discover.outputs.deps_tier_1) }}
        arch: [x86_64, aarch64]

    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v6

      - name: Build package
        uses: ./.github/actions/melange-build
        with:
          package-name: ${{ matrix.name }}
          arch: ${{ matrix.arch }}
          has-dependencies: "true"
          event-name: ${{ github.event_name }}
          signing-key-secret: ${{ env.MELANGE_SIGNING_KEY }}
          signing-key-pub-secret: ${{ env.MELANGE_SIGNING_KEY_PUB }}
          melange-version: ${{ env.MELANGE_VERSION }}

  melange-build-deps-tier-2:
    needs: [discover, keygen, melange-build-base, melange-build-deps-tier-1]
    if: >-
      always()
      && needs.discover.outputs.deps_tier_2 != '[]'
      && needs.discover.outputs.deps_tier_2 != '[""]'
      && (needs.melange-build-base.result == 'success' || needs.melange-build-base.result == 'skipped')
      && (needs.melange-build-deps-tier-1.result == 'success' || needs.melange-build-deps-tier-1.result == 'skipped')
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        name: ${{ fromJson(needs.discover.outputs.deps_tier_2) }}
        arch: [x86_64, aarch64]

    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v6

      - name: Build package
        uses: ./.github/actions/melange-build
        with:
          package-name: ${{ matrix.name }}
          arch: ${{ matrix.arch }}
          has-dependencies: "true"
          event-name: ${{ github.event_name }}
          signing-key-secret: ${{ env.MELANGE_SIGNING_KEY }}
          signing-key-pub-secret: ${{ env.MELANGE_SIGNING_KEY_PUB }}
          melange-version: ${{ env.MELANGE_VERSION }}

  melange-build-deps-tier-3:
    needs:
      [
        discover,
        keygen,
        melange-build-base,
        melange-build-deps-tier-1,
        melange-build-deps-tier-2,
      ]
    if: >-
      always()
      && needs.discover.outputs.deps_tier_3 != '[]'
      && needs.discover.outputs.deps_tier_3 != '[""]'
      && (needs.melange-build-base.result == 'success' || needs.melange-build-base.result == 'skipped')
      && (needs.melange-build-deps-tier-2.result == 'success' || needs.melange-build-deps-tier-2.result == 'skipped')
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        name: ${{ fromJson(needs.discover.outputs.deps_tier_3) }}
        arch: [x86_64, aarch64]

    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v6

      - name: Build package
        uses: ./.github/actions/melange-build
        with:
          package-name: ${{ matrix.name }}
          arch: ${{ matrix.arch }}
          has-dependencies: "true"
          event-name: ${{ github.event_name }}
          signing-key-secret: ${{ env.MELANGE_SIGNING_KEY }}
          signing-key-pub-secret: ${{ env.MELANGE_SIGNING_KEY_PUB }}
          melange-version: ${{ env.MELANGE_VERSION }}

  melange-build-deps-tier-4:
    needs:
      [
        discover,
        keygen,
        melange-build-base,
        melange-build-deps-tier-1,
        melange-build-deps-tier-2,
        melange-build-deps-tier-3,
      ]
    if: >-
      always()
      && needs.discover.outputs.deps_tier_4 != '[]'
      && needs.discover.outputs.deps_tier_4 != '[""]'
      && (needs.melange-build-base.result == 'success' || needs.melange-build-base.result == 'skipped')
      && (needs.melange-build-deps-tier-3.result == 'success' || needs.melange-build-deps-tier-3.result == 'skipped')
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        name: ${{ fromJson(needs.discover.outputs.deps_tier_4) }}
        arch: [x86_64, aarch64]

    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v6

      - name: Build package
        uses: ./.github/actions/melange-build
        with:
          package-name: ${{ matrix.name }}
          arch: ${{ matrix.arch }}
          has-dependencies: "true"
          event-name: ${{ github.event_name }}
          signing-key-secret: ${{ env.MELANGE_SIGNING_KEY }}
          signing-key-pub-secret: ${{ env.MELANGE_SIGNING_KEY_PUB }}
          melange-version: ${{ env.MELANGE_VERSION }}

  melange-build-deps-tier-5:
    needs:
      [
        discover,
        keygen,
        melange-build-base,
        melange-build-deps-tier-1,
        melange-build-deps-tier-2,
        melange-build-deps-tier-3,
        melange-build-deps-tier-4,
      ]
    if: >-
      always()
      && needs.discover.outputs.deps_tier_5 != '[]'
      && needs.discover.outputs.deps_tier_5 != '[""]'
      && (needs.melange-build-base.result == 'success' || needs.melange-build-base.result == 'skipped')
      && (needs.melange-build-deps-tier-4.result == 'success' || needs.melange-build-deps-tier-4.result == 'skipped')
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        name: ${{ fromJson(needs.discover.outputs.deps_tier_5) }}
        arch: [x86_64, aarch64]

    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v6

      - name: Build package
        uses: ./.github/actions/melange-build
        with:
          package-name: ${{ matrix.name }}
          arch: ${{ matrix.arch }}
          has-dependencies: "true"
          event-name: ${{ github.event_name }}
          signing-key-secret: ${{ env.MELANGE_SIGNING_KEY }}
          signing-key-pub-secret: ${{ env.MELANGE_SIGNING_KEY_PUB }}
          melange-version: ${{ env.MELANGE_VERSION }}

  ##############################################################################
  # FINAL TIER: BUILD ALL IMAGES (depends on all melange packages)             #
  ##############################################################################
  build-images:
    needs:
      [
        discover,
        melange-build-base,
        melange-build-deps-tier-1,
        melange-build-deps-tier-2,
        melange-build-deps-tier-3,
        melange-build-deps-tier-4,
        melange-build-deps-tier-5,
      ]
    if: >-
      always()
      && needs.discover.outputs.apko_images != '[]'
      && needs.discover.outputs.apko_images != '[""]'
      && (needs.melange-build-base.result == 'success' || needs.melange-build-base.result == 'skipped')
      && (needs.melange-build-deps-tier-1.result == 'success' || needs.melange-build-deps-tier-1.result == 'skipped')
      && (needs.melange-build-deps-tier-2.result == 'success' || needs.melange-build-deps-tier-2.result == 'skipped')
      && (needs.melange-build-deps-tier-3.result == 'success' || needs.melange-build-deps-tier-3.result == 'skipped')
      && (needs.melange-build-deps-tier-4.result == 'success' || needs.melange-build-deps-tier-4.result == 'skipped')
      && (needs.melange-build-deps-tier-5.result == 'success' || needs.melange-build-deps-tier-5.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        name: ${{ fromJson(needs.discover.outputs.apko_images) }}

    steps:
      - uses: actions/checkout@v6

      - name: Install build tools
        uses: ./.github/actions/setup-tools
        with:
          apko-version: ${{ env.APKO_VERSION }}
          melange-version: ${{ env.MELANGE_VERSION }}

      - uses: sigstore/cosign-installer@v4.1.0

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all packages
        if: >-
          needs.discover.outputs.base_packages != '[]'
          || needs.discover.outputs.deps_tier_1 != '[]'
          || needs.discover.outputs.deps_tier_2 != '[]'
          || needs.discover.outputs.deps_tier_3 != '[]'
          || needs.discover.outputs.deps_tier_4 != '[]'
          || needs.discover.outputs.deps_tier_5 != '[]'
        uses: actions/download-artifact@v8
        with:
          pattern: packages-*-*
          merge-multiple: true
          path: .

      - name: Setup signing key
        run: |
          if [ ! -f "melange.rsa.pub" ] && [ "${{ github.event_name }}" != "pull_request" ]; then
            printf '%s\n' "${{ env.MELANGE_SIGNING_KEY_PUB }}" > melange.rsa.pub
          fi
          if [ ! -f "melange.rsa" ] && [ "${{ github.event_name }}" != "pull_request" ]; then
            printf '%s\n' "${{ env.MELANGE_SIGNING_KEY }}" > melange.rsa
            chmod 600 melange.rsa
          fi

      - name: Re-index local packages
        run: |
          if [ -f "melange.rsa" ]; then
            for arch in x86_64 aarch64; do
              if [ -d "packages/$arch" ] && compgen -G "packages/$arch/*.apk" > /dev/null; then
                echo "Indexing $arch packages..."
                melange index --signing-key melange.rsa -o "packages/$arch/APKINDEX.tar.gz" "packages/$arch"/*.apk
              fi
            done
          fi

      - name: Extract version
        id: version
        uses: ./.github/actions/extract-version
        with:
          package-name: ${{ matrix.name }}

      - name: Build image tarball (x86_64)
        run: |
          rm -f sbom-*.spdx.json

          ARGS=""
          if [ -f "melange.rsa.pub" ]; then
            ARGS="$ARGS --keyring-append ./melange.rsa.pub"
          fi
          if [ -d "./packages" ]; then
            ARGS="$ARGS --repository-append ./packages"
          fi

          apko build "${{ matrix.name }}/apko.yaml" \
            "${{ env.REGISTRY_NAMESPACE }}/${{ matrix.name }}:verify-x86_64" \
            "${{ matrix.name }}-x86_64.tar" \
            --arch x86_64 \
            $ARGS

      - name: Scan image (x86_64)
        uses: ./.github/actions/scan-image
        with:
          image-tar: "${{ matrix.name }}-x86_64.tar"
          image-name: ${{ matrix.name }}
          arch: x86_64

      - name: Build image tarball (aarch64)
        run: |
          rm -f sbom-*.spdx.json

          ARGS=""
          if [ -f "melange.rsa.pub" ]; then
            ARGS="$ARGS --keyring-append ./melange.rsa.pub"
          fi
          if [ -d "./packages" ]; then
            ARGS="$ARGS --repository-append ./packages"
          fi

          apko build "${{ matrix.name }}/apko.yaml" \
            "${{ env.REGISTRY_NAMESPACE }}/${{ matrix.name }}:verify-aarch64" \
            "${{ matrix.name }}-aarch64.tar" \
            --arch aarch64 \
            $ARGS

      - name: Scan image (aarch64)
        uses: ./.github/actions/scan-image
        with:
          image-tar: "${{ matrix.name }}-aarch64.tar"
          image-name: ${{ matrix.name }}
          arch: aarch64

      - name: Publish multi-arch image
        if: github.event_name != 'pull_request'
        run: |
          ARGS=""
          if [ -f "melange.rsa.pub" ]; then
            ARGS="$ARGS --keyring-append ./melange.rsa.pub"
          fi
          if [ -d "./packages" ]; then
            ARGS="$ARGS --repository-append ./packages"
          fi

          apko publish "${{ matrix.name }}/apko.yaml" \
            "${{ env.REGISTRY_NAMESPACE }}/${{ matrix.name }}:${{ steps.version.outputs.tag }}" \
            "${{ env.REGISTRY_NAMESPACE }}/${{ matrix.name }}:latest" \
            --arch x86_64,aarch64 \
            $ARGS

      - name: Sign image with cosign
        if: github.event_name != 'pull_request'
        run: |
          cosign sign \
            --yes \
            "${{ env.REGISTRY_NAMESPACE }}/${{ matrix.name }}:${{ steps.version.outputs.tag }}"

  ##############################################################################
  # SUMMARY                                                                    #
  ##############################################################################
  summary:
    needs:
      [
        discover,
        melange-build-base,
        melange-build-deps-tier-1,
        melange-build-deps-tier-2,
        melange-build-deps-tier-3,
        melange-build-deps-tier-4,
        melange-build-deps-tier-5,
        build-images,
      ]
    runs-on: ubuntu-latest
    if: always()
    permissions: {}
    steps:
      - name: Check results
        run: |
          DISCOVER="${{ needs.discover.result }}"
          BASE="${{ needs.melange-build-base.result }}"
          DEPS_TIER_1="${{ needs.melange-build-deps-tier-1.result }}"
          DEPS_TIER_2="${{ needs.melange-build-deps-tier-2.result }}"
          DEPS_TIER_3="${{ needs.melange-build-deps-tier-3.result }}"
          DEPS_TIER_4="${{ needs.melange-build-deps-tier-4.result }}"
          DEPS_TIER_5="${{ needs.melange-build-deps-tier-5.result }}"
          BUILD_IMAGES="${{ needs.build-images.result }}"
          echo "discover: $DISCOVER"
          echo "melange-build-base: $BASE"
          echo "melange-build-deps-tier-1: $DEPS_TIER_1"
          echo "melange-build-deps-tier-2: $DEPS_TIER_2"
          echo "melange-build-deps-tier-3: $DEPS_TIER_3"
          echo "melange-build-deps-tier-4: $DEPS_TIER_4"
          echo "melange-build-deps-tier-5: $DEPS_TIER_5"
          echo "build-images: $BUILD_IMAGES"

          if [[ "$DISCOVER" != "success" ]]; then
            echo "::error::Discover did not succeed"
            exit 1
          fi

          if [[ "$BASE" != "success" && "$BASE" != "skipped" ]]; then
            echo "::error::Base package build did not succeed"
            exit 1
          fi

          if [[ "$DEPS_TIER_1" != "success" && "$DEPS_TIER_1" != "skipped" ]]; then
            echo "::error::Dependent package build tier 1 did not succeed"
            exit 1
          fi

          if [[ "$DEPS_TIER_2" != "success" && "$DEPS_TIER_2" != "skipped" ]]; then
            echo "::error::Dependent package build tier 2 did not succeed"
            exit 1
          fi

          if [[ "$DEPS_TIER_3" != "success" && "$DEPS_TIER_3" != "skipped" ]]; then
            echo "::error::Dependent package build tier 3 did not succeed"
            exit 1
          fi

          if [[ "$DEPS_TIER_4" != "success" && "$DEPS_TIER_4" != "skipped" ]]; then
            echo "::error::Dependent package build tier 4 did not succeed"
            exit 1
          fi

          if [[ "$DEPS_TIER_5" != "success" && "$DEPS_TIER_5" != "skipped" ]]; then
            echo "::error::Dependent package build tier 5 did not succeed"
            exit 1
          fi

          if [[ "$BUILD_IMAGES" != "success" && "$BUILD_IMAGES" != "skipped" ]]; then
            echo "::error::Image build/scan/publish did not succeed"
            exit 1
          fi

  ##############################################################################
  # CLEANUP OLD VERSIONS                                                       #
  ##############################################################################
  cleanup:
    needs: [build-images]
    runs-on: ubuntu-latest
    if: always() && github.event_name != 'pull_request'
    permissions:
      packages: write
    steps:
      - name: Delete old untagged versions
        run: |
          gh api "/orgs/${{ github.repository_owner }}/packages?package_type=container" \
            --paginate --jq '.[].name' 2>/dev/null | \
          while read -r pkg; do
            echo "Cleaning old versions from $pkg..."
            gh api "/orgs/${{ github.repository_owner }}/packages/container/$pkg/versions" \
              --paginate --jq '[.[] | select(.metadata.container.tags | length == 0)] | sort_by(.created_at) | reverse | .[4:] | .[].id' 2>/dev/null | \
            while read -r id; do
              echo "  Deleting version $id"
              gh api --method DELETE "/orgs/${{ github.repository_owner }}/packages/container/$pkg/versions/$id" 2>/dev/null || true
            done
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
