name: Build Hardened Images

on:
  push:
    branches: [main]
    paths:
      - "*/apko.yaml"
      - "*/melange.yaml"
      - "*/publish.json"
      - ".github/workflows/build.yaml"
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write
  actions: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY_HOST: ghcr.io
  REGISTRY_NAMESPACE: ghcr.io/${{ github.repository_owner }}
  MELANGE_VERSION: v0.50.4 # renovate: datasource=github-releases depName=chainguard-dev/melange
  APKO_IMAGE: ghcr.io/wolfi-dev/sdk:latest@sha256:71c60c596fd1414e0a765ac3980b757370da83ab1573a6d34a0e2ce991efd754 # renovate: datasource=docker depName=ghcr.io/wolfi-dev/sdk
  MELANGE_SIGNING_KEY: ${{ secrets.MELANGE_SIGNING_KEY }}
  MELANGE_SIGNING_KEY_PUB: ${{ secrets.MELANGE_SIGNING_KEY_PUB }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MAX_DEP_TIER: 5

jobs:
  ##############################################################################
  # DISCOVER PACKAGES AND IMAGES TO BUILD (outputs for downstream jobs)        #
  ##############################################################################
  discover:
    runs-on: ubuntu-latest
    outputs:
      base_packages: ${{ steps.set.outputs.base_packages }}
      deps_tier_1: ${{ steps.set.outputs.deps_tier_1 }}
      deps_tier_2: ${{ steps.set.outputs.deps_tier_2 }}
      deps_tier_3: ${{ steps.set.outputs.deps_tier_3 }}
      deps_tier_4: ${{ steps.set.outputs.deps_tier_4 }}
      deps_tier_5: ${{ steps.set.outputs.deps_tier_5 }}
      apko_images: ${{ steps.set.outputs.apko_images }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: set
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t all_apko < <(find . -maxdepth 2 -name apko.yaml | sed 's|^\./||; s|/apko.yaml$||' | sort -u)
          mapfile -t all_melange < <(find . -maxdepth 2 -name melange.yaml | sed 's|^\./||; s|/melange.yaml$||' | sort -u)

          json_array() {
            if [ "$#" -eq 0 ]; then
              printf '[]'
            else
              printf '%s\n' "$@" | jq -R -s -c 'split("\n") | map(select(length > 0))'
            fi
          }

          declare -A deps_of
          for pkg in "${all_melange[@]}"; do
            pkg_deps=""
            for dep in "${all_melange[@]}"; do
              if [ "$pkg" != "$dep" ] && grep -E -q "^[[:space:]]+-[[:space:]]+${dep}(-.*)?(=.*)?$" "$pkg/melange.yaml"; then
                pkg_deps="$pkg_deps $dep"
              fi
            done
            deps_of["$pkg"]="${pkg_deps# }"
          done

          base_packages=()
          dep_packages=()
          for pkg in "${all_melange[@]}"; do
            if [ -n "${deps_of[$pkg]}" ]; then
              dep_packages+=("$pkg")
            else
              base_packages+=("$pkg")
            fi
          done

          declare -A resolved
          for pkg in "${base_packages[@]}"; do
            resolved["$pkg"]=1
          done

          sorted_deps=()
          remaining=("${dep_packages[@]}")
          max_iter=${#dep_packages[@]}
          iter=0

          while [ "${#remaining[@]}" -gt 0 ]; do
            ((iter += 1))
            if [ "$iter" -gt "$max_iter" ]; then
              echo "::error::Circular dependency: ${remaining[*]}"
              exit 1
            fi

            progress=false
            next=()
            for pkg in "${remaining[@]}"; do
              all_ok=true
              for dep in ${deps_of[$pkg]}; do
                if [ -z "${resolved[$dep]+x}" ]; then
                  all_ok=false
                  break
                fi
              done

              if [ "$all_ok" = true ]; then
                sorted_deps+=("$pkg")
                resolved["$pkg"]=1
                progress=true
              else
                next+=("$pkg")
              fi
            done

            if [ "$progress" = false ]; then
              echo "::error::Circular dependency: ${next[*]}"
              exit 1
            fi

            remaining=("${next[@]}")
          done

          MAX_TIERS=${{ env.MAX_DEP_TIER }}

          declare -A pkg_level
          for pkg in "${base_packages[@]}"; do
            pkg_level["$pkg"]=0
          done

          for i in $(seq 1 "$MAX_TIERS"); do
            declare -a "tier_$i=()"
          done

          for pkg in "${sorted_deps[@]}"; do
            max_dep_level=0
            for dep in ${deps_of[$pkg]}; do
              dep_lvl=${pkg_level[$dep]:-0}
              if [ "$dep_lvl" -gt "$max_dep_level" ]; then
                max_dep_level=$dep_lvl
              fi
            done

            level=$((max_dep_level + 1))
            if [ "$level" -gt "$MAX_TIERS" ]; then
              echo "::error::Package '$pkg' requires tier $level but max is $MAX_TIERS. Add more tier jobs to the workflow."
              exit 1
            fi

            pkg_level["$pkg"]=$level
            eval "tier_${level}+=(\"$pkg\")"
          done

          echo "base_packages=$(json_array "${base_packages[@]}")" >> "$GITHUB_OUTPUT"
          for i in $(seq 1 "$MAX_TIERS"); do
            eval "pkgs=(\"\${tier_${i}[@]}\")"
            echo "deps_tier_${i}=$(json_array "${pkgs[@]}")" >> "$GITHUB_OUTPUT"
          done
          echo "apko_images=$(json_array "${all_apko[@]}")" >> "$GITHUB_OUTPUT"

          echo "Base: ${base_packages[*]:-<none>}"
          for i in $(seq 1 "$MAX_TIERS"); do
            eval "pkgs=(\"\${tier_${i}[@]}\")"
            if [ "${#pkgs[@]}" -gt 0 ]; then
              echo "Deps tier $i: ${pkgs[*]}"
            fi
          done
          echo "Images: ${all_apko[*]:-<none>}"

  ##############################################################################
  # GENERATE EPHEMERAL SIGNING KEY (PR only - secrets not available for forks) #
  ##############################################################################
  keygen:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install melange
        uses: chainguard-dev/actions/setup-melange@0cba302c40fce067ec0d39f1d91b10580d4b06b0 # v1.6.16
        with:
          version: ${{ env.MELANGE_VERSION }}

      - name: Generate ephemeral signing key
        uses: chainguard-dev/actions/melange-keygen@0cba302c40fce067ec0d39f1d91b10580d4b06b0 # v1.6.16
        with:
          signing-key-path: ${{ github.workspace }}/melange.rsa

      - name: Upload signing key
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: melange-ephemeral-key
          path: |
            melange.rsa
            melange.rsa.pub
          retention-days: 1

  ##############################################################################
  # TIER 1: BUILD BASE MELANGE PACKAGES (no internal dependencies)             #
  ##############################################################################
  melange-build-base:
    needs: [discover, keygen]
    if: always() && needs.discover.outputs.base_packages != '[]' && needs.discover.outputs.base_packages != '[""]'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        name: ${{ fromJson(needs.discover.outputs.base_packages) }}
        arch: [x86_64, aarch64]

    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build package
        uses: ./.github/actions/melange-build
        with:
          package-name: ${{ matrix.name }}
          arch: ${{ matrix.arch }}
          event-name: ${{ github.event_name }}
          signing-key-secret: ${{ env.MELANGE_SIGNING_KEY }}
          signing-key-pub-secret: ${{ env.MELANGE_SIGNING_KEY_PUB }}
          melange-version: ${{ env.MELANGE_VERSION }}

  ##############################################################################
  # TIER 2+: BUILD DEPENDENT MELANGE PACKAGES (tiered by dependency depth)     #
  ##############################################################################
  melange-build-deps-tier-1:
    needs: [discover, keygen, melange-build-base]
    if: >-
      always()
      && needs.discover.outputs.deps_tier_1 != '[]'
      && needs.discover.outputs.deps_tier_1 != '[""]'
      && (needs.melange-build-base.result == 'success' || needs.melange-build-base.result == 'skipped')
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        name: ${{ fromJson(needs.discover.outputs.deps_tier_1) }}
        arch: [x86_64, aarch64]

    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build package
        uses: ./.github/actions/melange-build
        with:
          package-name: ${{ matrix.name }}
          arch: ${{ matrix.arch }}
          has-dependencies: "true"
          event-name: ${{ github.event_name }}
          signing-key-secret: ${{ env.MELANGE_SIGNING_KEY }}
          signing-key-pub-secret: ${{ env.MELANGE_SIGNING_KEY_PUB }}
          melange-version: ${{ env.MELANGE_VERSION }}

  melange-build-deps-tier-2:
    needs: [discover, keygen, melange-build-base, melange-build-deps-tier-1]
    if: >-
      always()
      && needs.discover.outputs.deps_tier_2 != '[]'
      && needs.discover.outputs.deps_tier_2 != '[""]'
      && (needs.melange-build-base.result == 'success' || needs.melange-build-base.result == 'skipped')
      && (needs.melange-build-deps-tier-1.result == 'success' || needs.melange-build-deps-tier-1.result == 'skipped')
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        name: ${{ fromJson(needs.discover.outputs.deps_tier_2) }}
        arch: [x86_64, aarch64]

    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build package
        uses: ./.github/actions/melange-build
        with:
          package-name: ${{ matrix.name }}
          arch: ${{ matrix.arch }}
          has-dependencies: "true"
          event-name: ${{ github.event_name }}
          signing-key-secret: ${{ env.MELANGE_SIGNING_KEY }}
          signing-key-pub-secret: ${{ env.MELANGE_SIGNING_KEY_PUB }}
          melange-version: ${{ env.MELANGE_VERSION }}

  melange-build-deps-tier-3:
    needs:
      [
        discover,
        keygen,
        melange-build-base,
        melange-build-deps-tier-1,
        melange-build-deps-tier-2,
      ]
    if: >-
      always()
      && needs.discover.outputs.deps_tier_3 != '[]'
      && needs.discover.outputs.deps_tier_3 != '[""]'
      && (needs.melange-build-base.result == 'success' || needs.melange-build-base.result == 'skipped')
      && (needs.melange-build-deps-tier-2.result == 'success' || needs.melange-build-deps-tier-2.result == 'skipped')
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        name: ${{ fromJson(needs.discover.outputs.deps_tier_3) }}
        arch: [x86_64, aarch64]

    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build package
        uses: ./.github/actions/melange-build
        with:
          package-name: ${{ matrix.name }}
          arch: ${{ matrix.arch }}
          has-dependencies: "true"
          event-name: ${{ github.event_name }}
          signing-key-secret: ${{ env.MELANGE_SIGNING_KEY }}
          signing-key-pub-secret: ${{ env.MELANGE_SIGNING_KEY_PUB }}
          melange-version: ${{ env.MELANGE_VERSION }}

  melange-build-deps-tier-4:
    needs:
      [
        discover,
        keygen,
        melange-build-base,
        melange-build-deps-tier-1,
        melange-build-deps-tier-2,
        melange-build-deps-tier-3,
      ]
    if: >-
      always()
      && needs.discover.outputs.deps_tier_4 != '[]'
      && needs.discover.outputs.deps_tier_4 != '[""]'
      && (needs.melange-build-base.result == 'success' || needs.melange-build-base.result == 'skipped')
      && (needs.melange-build-deps-tier-3.result == 'success' || needs.melange-build-deps-tier-3.result == 'skipped')
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        name: ${{ fromJson(needs.discover.outputs.deps_tier_4) }}
        arch: [x86_64, aarch64]

    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build package
        uses: ./.github/actions/melange-build
        with:
          package-name: ${{ matrix.name }}
          arch: ${{ matrix.arch }}
          has-dependencies: "true"
          event-name: ${{ github.event_name }}
          signing-key-secret: ${{ env.MELANGE_SIGNING_KEY }}
          signing-key-pub-secret: ${{ env.MELANGE_SIGNING_KEY_PUB }}
          melange-version: ${{ env.MELANGE_VERSION }}

  melange-build-deps-tier-5:
    needs:
      [
        discover,
        keygen,
        melange-build-base,
        melange-build-deps-tier-1,
        melange-build-deps-tier-2,
        melange-build-deps-tier-3,
        melange-build-deps-tier-4,
      ]
    if: >-
      always()
      && needs.discover.outputs.deps_tier_5 != '[]'
      && needs.discover.outputs.deps_tier_5 != '[""]'
      && (needs.melange-build-base.result == 'success' || needs.melange-build-base.result == 'skipped')
      && (needs.melange-build-deps-tier-4.result == 'success' || needs.melange-build-deps-tier-4.result == 'skipped')
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        name: ${{ fromJson(needs.discover.outputs.deps_tier_5) }}
        arch: [x86_64, aarch64]

    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build package
        uses: ./.github/actions/melange-build
        with:
          package-name: ${{ matrix.name }}
          arch: ${{ matrix.arch }}
          has-dependencies: "true"
          event-name: ${{ github.event_name }}
          signing-key-secret: ${{ env.MELANGE_SIGNING_KEY }}
          signing-key-pub-secret: ${{ env.MELANGE_SIGNING_KEY_PUB }}
          melange-version: ${{ env.MELANGE_VERSION }}

  ##############################################################################
  # FINAL TIER: BUILD ALL IMAGES (depends on all melange packages)             #
  ##############################################################################
  build-images:
    needs:
      [
        discover,
        melange-build-base,
        melange-build-deps-tier-1,
        melange-build-deps-tier-2,
        melange-build-deps-tier-3,
        melange-build-deps-tier-4,
        melange-build-deps-tier-5,
      ]
    if: >-
      always()
      && needs.discover.outputs.apko_images != '[]'
      && needs.discover.outputs.apko_images != '[""]'
      && (needs.melange-build-base.result == 'success' || needs.melange-build-base.result == 'skipped')
      && (needs.melange-build-deps-tier-1.result == 'success' || needs.melange-build-deps-tier-1.result == 'skipped')
      && (needs.melange-build-deps-tier-2.result == 'success' || needs.melange-build-deps-tier-2.result == 'skipped')
      && (needs.melange-build-deps-tier-3.result == 'success' || needs.melange-build-deps-tier-3.result == 'skipped')
      && (needs.melange-build-deps-tier-4.result == 'success' || needs.melange-build-deps-tier-4.result == 'skipped')
      && (needs.melange-build-deps-tier-5.result == 'success' || needs.melange-build-deps-tier-5.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        name: ${{ fromJson(needs.discover.outputs.apko_images) }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install melange
        uses: chainguard-dev/actions/setup-melange@0cba302c40fce067ec0d39f1d91b10580d4b06b0 # v1.6.16
        with:
          version: ${{ env.MELANGE_VERSION }}

      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all packages
        if: >-
          needs.discover.outputs.base_packages != '[]'
          || needs.discover.outputs.deps_tier_1 != '[]'
          || needs.discover.outputs.deps_tier_2 != '[]'
          || needs.discover.outputs.deps_tier_3 != '[]'
          || needs.discover.outputs.deps_tier_4 != '[]'
          || needs.discover.outputs.deps_tier_5 != '[]'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: packages-*-*
          merge-multiple: true
          path: .

      - name: Setup signing key
        run: |
          if [ ! -f "melange.rsa.pub" ] && [ "${{ github.event_name }}" != "pull_request" ]; then
            printf '%s\n' "${{ env.MELANGE_SIGNING_KEY_PUB }}" > melange.rsa.pub
          fi
          if [ ! -f "melange.rsa" ] && [ "${{ github.event_name }}" != "pull_request" ]; then
            printf '%s\n' "${{ env.MELANGE_SIGNING_KEY }}" > melange.rsa
            chmod 600 melange.rsa
          fi

      - name: Re-index local packages
        run: |
          if [ -f "melange.rsa" ]; then
            for arch in x86_64 aarch64; do
              if [ -d "packages/$arch" ] && compgen -G "packages/$arch/*.apk" > /dev/null; then
                echo "Indexing $arch packages..."
                melange index --signing-key melange.rsa -o "packages/$arch/APKINDEX.tar.gz" "packages/$arch"/*.apk
              fi
            done
          fi

      - name: Resolve publish metadata
        id: publish_meta
        uses: ./.github/actions/extract-version
        with:
          package-name: ${{ matrix.name }}

      - name: Clean SBOMs (x86_64)
        run: rm -f sbom-*.spdx.json

      - name: Build image tarball (x86_64)
        uses: chainguard-images/actions/apko-build@0cc754fd186bd93add9d6b5057af66ebf1d08d9d # v1.0.25
        with:
          apko-image: ${{ env.APKO_IMAGE }}
          config: ${{ matrix.name }}/apko.yaml
          tag: ${{ env.REGISTRY_NAMESPACE }}/${{ matrix.name }}:verify-x86_64
          keyring-append: ./melange.rsa.pub
          repository-append: ./packages
          archs: x86_64

      - name: Rename tarball (x86_64)
        run: mv output.tar ${{ matrix.name }}-x86_64.tar

      - name: Rename SBOM (x86_64)
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f "sbom-x86_64.spdx.json" ]; then
            echo "::error::Expected sbom-x86_64.spdx.json after apko build"
            ls -1 sbom-*.spdx.json 2>/dev/null || true
            exit 1
          fi
          mv "sbom-x86_64.spdx.json" "${{ matrix.name }}-x86_64.spdx.json"
          rm -f sbom-index.spdx.json

      - name: Clean SBOMs (aarch64)
        run: rm -f sbom-*.spdx.json

      - name: Build image tarball (aarch64)
        uses: chainguard-images/actions/apko-build@0cc754fd186bd93add9d6b5057af66ebf1d08d9d # v1.0.25
        with:
          apko-image: ${{ env.APKO_IMAGE }}
          config: ${{ matrix.name }}/apko.yaml
          tag: ${{ env.REGISTRY_NAMESPACE }}/${{ matrix.name }}:verify-aarch64
          keyring-append: ./melange.rsa.pub
          repository-append: ./packages
          archs: aarch64

      - name: Rename tarball (aarch64)
        run: mv output.tar ${{ matrix.name }}-aarch64.tar

      - name: Rename SBOM (aarch64)
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f "sbom-aarch64.spdx.json" ]; then
            echo "::error::Expected sbom-aarch64.spdx.json after apko build"
            ls -1 sbom-*.spdx.json 2>/dev/null || true
            exit 1
          fi
          mv "sbom-aarch64.spdx.json" "${{ matrix.name }}-aarch64.spdx.json"
          rm -f sbom-index.spdx.json

      - name: Resolve release tag
        id: release_tag
        shell: bash
        env:
          IMAGE_NAME: ${{ matrix.name }}
          RELEASE_TAG_HINT: ${{ steps.publish_meta.outputs.release_tag }}
          VERSION_SOURCE_PACKAGE: ${{ steps.publish_meta.outputs.version_source_package }}
          VERSION_TRIM_PREFIX: ${{ steps.publish_meta.outputs.version_trim_prefix }}
          VERSION_TRIM_SUFFIX: ${{ steps.publish_meta.outputs.version_trim_suffix }}
        run: |
          set -euo pipefail

          release_tag="${RELEASE_TAG_HINT}"

          if [ -z "$release_tag" ] && [ -n "$VERSION_SOURCE_PACKAGE" ]; then
            version_from_sbom() {
              local sbom="$1"
              jq -r --arg pkg "$VERSION_SOURCE_PACKAGE" '
                [.packages[]? | select(.name == $pkg) | .versionInfo // empty][0] // empty
              ' "$sbom"
            }

            x86_sbom="${IMAGE_NAME}-x86_64.spdx.json"
            arm_sbom="${IMAGE_NAME}-aarch64.spdx.json"
            version_x86_64="$(version_from_sbom "$x86_sbom")"
            version_aarch64="$(version_from_sbom "$arm_sbom")"

            if [ -z "$version_x86_64" ]; then
              echo "::error::Package '$VERSION_SOURCE_PACKAGE' not found in $x86_sbom"
              exit 1
            fi

            if [ -z "$version_aarch64" ]; then
              echo "::error::Package '$VERSION_SOURCE_PACKAGE' not found in $arm_sbom"
              exit 1
            fi

            if [ "$version_x86_64" != "$version_aarch64" ]; then
              echo "::error::Package '$VERSION_SOURCE_PACKAGE' resolved different versions across architectures: x86_64=$version_x86_64 aarch64=$version_aarch64"
              exit 1
            fi

            release_tag="$version_x86_64"
          fi

          if [ -n "$VERSION_TRIM_PREFIX" ] && [[ "$release_tag" == "$VERSION_TRIM_PREFIX"* ]]; then
            release_tag="${release_tag#"$VERSION_TRIM_PREFIX"}"
          fi

          if [ -n "$VERSION_TRIM_SUFFIX" ] && [[ "$release_tag" == *"$VERSION_TRIM_SUFFIX" ]]; then
            release_tag="${release_tag%"$VERSION_TRIM_SUFFIX"}"
          fi

          if [ -z "$release_tag" ]; then
            release_tag='latest'
          fi

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Resolve publish tags
        id: publish_tags
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.release_tag }}
          PUBLISH_LATEST: ${{ steps.publish_meta.outputs.publish_latest }}
        run: |
          set -euo pipefail

          declare -a tags=()

          add_tag() {
            local candidate="$1"
            [ -n "$candidate" ] || return 0
            local existing
            for existing in "${tags[@]:-}"; do
              if [ "$existing" = "$candidate" ]; then
                return 0
              fi
            done
            tags+=("$candidate")
          }

          add_tag "$RELEASE_TAG"

          version_core="$RELEASE_TAG"
          if [[ "$version_core" =~ ^(.+)-r[0-9]+$ ]]; then
            version_core="${BASH_REMATCH[1]}"
            add_tag "$version_core"
          fi

          truncated="$version_core"
          while [[ "$truncated" == *.* ]]; do
            truncated="${truncated%.*}"
            add_tag "$truncated"
          done

          if [ "$PUBLISH_LATEST" = "true" ]; then
            add_tag latest
          fi

          stream_tag=''
          if [[ "$version_core" =~ ^([0-9]+)(\.|$) ]]; then
            stream_tag="${BASH_REMATCH[1]}"
          fi

          published_tags=$(printf '%s\n' "${tags[@]}" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "published_tags=$published_tags" >> "$GITHUB_OUTPUT"
          echo "stream_tag=$stream_tag" >> "$GITHUB_OUTPUT"

      - name: Scan image (x86_64)
        uses: ./.github/actions/scan-image
        with:
          image-tar: "${{ matrix.name }}-x86_64.tar"
          image-name: ${{ matrix.name }}
          arch: x86_64
          repository: ${{ steps.publish_meta.outputs.repository }}
          release-tag: ${{ steps.release_tag.outputs.release_tag }}
          stream-tag: ${{ steps.publish_tags.outputs.stream_tag }}
          published-tags-json: ${{ steps.publish_tags.outputs.published_tags }}
          sbom-path: "${{ matrix.name }}-x86_64.spdx.json"

      - name: Scan image (aarch64)
        uses: ./.github/actions/scan-image
        with:
          image-tar: "${{ matrix.name }}-aarch64.tar"
          image-name: ${{ matrix.name }}
          arch: aarch64
          repository: ${{ steps.publish_meta.outputs.repository }}
          release-tag: ${{ steps.release_tag.outputs.release_tag }}
          stream-tag: ${{ steps.publish_tags.outputs.stream_tag }}
          published-tags-json: ${{ steps.publish_tags.outputs.published_tags }}
          sbom-path: "${{ matrix.name }}-aarch64.spdx.json"

      - name: Publish multi-arch image
        if: github.event_name != 'pull_request'
        id: publish
        uses: chainguard-images/actions/apko-publish@0cc754fd186bd93add9d6b5057af66ebf1d08d9d # v1.0.25
        with:
          apko-image: ${{ env.APKO_IMAGE }}
          config: ${{ matrix.name }}/apko.yaml
          tag: ${{ env.REGISTRY_NAMESPACE }}/${{ steps.publish_meta.outputs.repository }}:${{ steps.release_tag.outputs.release_tag }}
          keyring-append: ./melange.rsa.pub
          repository-append: ./packages
          archs: x86_64,aarch64
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish tag aliases
        if: github.event_name != 'pull_request'
        env:
          REPOSITORY: ${{ steps.publish_meta.outputs.repository }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.release_tag }}
          PUBLISHED_TAGS: ${{ steps.publish_tags.outputs.published_tags }}
        run: |
          set -euo pipefail
          source_ref="${{ env.REGISTRY_NAMESPACE }}/${REPOSITORY}:${RELEASE_TAG}"
          for tag in $(jq -r '.[]' <<<"$PUBLISHED_TAGS"); do
            if [ "$tag" = "$RELEASE_TAG" ]; then
              continue
            fi
            docker buildx imagetools create \
              -t "${{ env.REGISTRY_NAMESPACE }}/${REPOSITORY}:${tag}" \
              "$source_ref"
          done

      - name: Sign image with cosign
        if: github.event_name != 'pull_request'
        env:
          REPOSITORY: ${{ steps.publish_meta.outputs.repository }}
        run: |
          set -euo pipefail
          digest="${{ steps.publish.outputs.digest }}"
          digest="${digest##*@}"
          cosign sign \
            --yes \
            "${{ env.REGISTRY_NAMESPACE }}/${REPOSITORY}@${digest}"

  ##############################################################################
  # SUMMARY                                                                    #
  ##############################################################################
  summary:
    needs:
      [
        discover,
        melange-build-base,
        melange-build-deps-tier-1,
        melange-build-deps-tier-2,
        melange-build-deps-tier-3,
        melange-build-deps-tier-4,
        melange-build-deps-tier-5,
        build-images,
      ]
    runs-on: ubuntu-latest
    if: always()
    permissions: {}
    steps:
      - name: Check results
        run: |
          DISCOVER="${{ needs.discover.result }}"
          BASE="${{ needs.melange-build-base.result }}"
          DEPS_TIER_1="${{ needs.melange-build-deps-tier-1.result }}"
          DEPS_TIER_2="${{ needs.melange-build-deps-tier-2.result }}"
          DEPS_TIER_3="${{ needs.melange-build-deps-tier-3.result }}"
          DEPS_TIER_4="${{ needs.melange-build-deps-tier-4.result }}"
          DEPS_TIER_5="${{ needs.melange-build-deps-tier-5.result }}"
          BUILD_IMAGES="${{ needs.build-images.result }}"
          echo "discover: $DISCOVER"
          echo "melange-build-base: $BASE"
          echo "melange-build-deps-tier-1: $DEPS_TIER_1"
          echo "melange-build-deps-tier-2: $DEPS_TIER_2"
          echo "melange-build-deps-tier-3: $DEPS_TIER_3"
          echo "melange-build-deps-tier-4: $DEPS_TIER_4"
          echo "melange-build-deps-tier-5: $DEPS_TIER_5"
          echo "build-images: $BUILD_IMAGES"

          if [[ "$DISCOVER" != "success" ]]; then
            echo "::error::Discover did not succeed"
            exit 1
          fi

          if [[ "$BASE" != "success" && "$BASE" != "skipped" ]]; then
            echo "::error::Base package build did not succeed"
            exit 1
          fi

          if [[ "$DEPS_TIER_1" != "success" && "$DEPS_TIER_1" != "skipped" ]]; then
            echo "::error::Dependent package build tier 1 did not succeed"
            exit 1
          fi

          if [[ "$DEPS_TIER_2" != "success" && "$DEPS_TIER_2" != "skipped" ]]; then
            echo "::error::Dependent package build tier 2 did not succeed"
            exit 1
          fi

          if [[ "$DEPS_TIER_3" != "success" && "$DEPS_TIER_3" != "skipped" ]]; then
            echo "::error::Dependent package build tier 3 did not succeed"
            exit 1
          fi

          if [[ "$DEPS_TIER_4" != "success" && "$DEPS_TIER_4" != "skipped" ]]; then
            echo "::error::Dependent package build tier 4 did not succeed"
            exit 1
          fi

          if [[ "$DEPS_TIER_5" != "success" && "$DEPS_TIER_5" != "skipped" ]]; then
            echo "::error::Dependent package build tier 5 did not succeed"
            exit 1
          fi

          if [[ "$BUILD_IMAGES" != "success" && "$BUILD_IMAGES" != "skipped" ]]; then
            echo "::error::Image build/scan/publish did not succeed"
            exit 1
          fi

  ##############################################################################
  # CLEANUP OLD VERSIONS                                                       #
  ##############################################################################
  cleanup:
    needs: [build-images]
    runs-on: ubuntu-latest
    if: always() && github.event_name != 'pull_request'
    permissions:
      packages: write
    steps:
      - name: Delete old untagged versions
        run: |
          gh api "/orgs/${{ github.repository_owner }}/packages?package_type=container" \
            --paginate --jq '.[].name' 2>/dev/null | \
          while read -r pkg; do
            echo "Cleaning old versions from $pkg..."
            gh api "/orgs/${{ github.repository_owner }}/packages/container/$pkg/versions" \
              --paginate --jq '[.[] | select(.metadata.container.tags | length == 0)] | sort_by(.created_at) | reverse | .[4:] | .[].id' 2>/dev/null | \
            while read -r id; do
              echo "  Deleting version $id"
              gh api --method DELETE "/orgs/${{ github.repository_owner }}/packages/container/$pkg/versions/$id" 2>/dev/null || true
            done
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
