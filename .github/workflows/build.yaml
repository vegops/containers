name: Build Hardened Images

on:
  push:
    branches: [main]
    paths:
      - "*/apko.yaml"
      - "*/melange.yaml"
      - ".github/workflows/build.yaml"
      - ".github/workflows/cve-report.yaml"
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY_HOST: ghcr.io
  REGISTRY_NAMESPACE: ghcr.io/${{ github.repository_owner }}
  MELANGE_VERSION: v0.45.3
  APKO_VERSION: v1.1.14
  MELANGE_SIGNING_KEY: ${{ secrets.MELANGE_SIGNING_KEY }}
  MELANGE_SIGNING_KEY_PUB: ${{ secrets.MELANGE_SIGNING_KEY_PUB }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ##############################################################################
  # DISCOVER PACKAGES AND IMAGES TO BUILD (outputs for downstream jobs)        #
  ##############################################################################
  discover:
    runs-on: ubuntu-latest
    outputs:
      base_packages: ${{ steps.set.outputs.base_packages }}
      app_packages: ${{ steps.set.outputs.app_packages }}
      apko_images: ${{ steps.set.outputs.apko_images }}
    steps:
      - uses: actions/checkout@v4

      - id: set
        run: |
          ALL_APKO=$(find . -maxdepth 2 -name apko.yaml | sed 's|^\./||; s|/apko.yaml$||' | sort -u)
          ALL_MELANGE=$(find . -maxdepth 2 -name melange.yaml | sed 's|^\./||; s|/melange.yaml$||' | sort -u)

          BASE_PACKAGES=""
          APP_PACKAGES=""

          for pkg in $ALL_MELANGE; do
            HAS_DEP=false
            for dep in $ALL_MELANGE; do
              if [ "$pkg" != "$dep" ]; then
                # Match dependencies allowing -dev, -static, etc subpackages
                if grep -E -q "^[[:space:]]+-[[:space:]]+${dep}(-.*)?$" "$pkg/melange.yaml" || grep -E -q "^[[:space:]]+-[[:space:]]+${dep}(-.*)?=" "$pkg/melange.yaml"; then
                  HAS_DEP=true
                  break
                fi
              fi
            done
            
            if [ "$HAS_DEP" = true ]; then
              APP_PACKAGES="$APP_PACKAGES $pkg"
            else
              BASE_PACKAGES="$BASE_PACKAGES $pkg"
            fi
          done

          echo "base_packages=$(echo $BASE_PACKAGES | awk '{$1=$1}1' | tr ' ' '\n' | jq -R -s -c 'split("\n") | map(select(length>0))')" >> $GITHUB_OUTPUT
          echo "app_packages=$(echo $APP_PACKAGES | awk '{$1=$1}1' | tr ' ' '\n' | jq -R -s -c 'split("\n") | map(select(length>0))')" >> $GITHUB_OUTPUT
          echo "apko_images=$(echo $ALL_APKO | awk '{$1=$1}1' | tr ' ' '\n' | jq -R -s -c 'split("\n") | map(select(length>0))')" >> $GITHUB_OUTPUT

  ##############################################################################
  # GENERATE EPHEMERAL SIGNING KEY (PR only - secrets not available for forks) #
  ##############################################################################
  keygen:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Install melange
        run: |
          go install chainguard.dev/melange@${{ env.MELANGE_VERSION }}
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Generate ephemeral signing key
        run: |
          echo "Generating ephemeral key for PR build (not used for publishing)"
          melange keygen

      - name: Upload signing key
        uses: actions/upload-artifact@v4
        with:
          name: melange-ephemeral-key
          path: |
            melange.rsa
            melange.rsa.pub
          retention-days: 1

  ##############################################################################
  # TIER 1: BUILD BASE MELANGE PACKAGES (no internal dependencies)             #
  ##############################################################################
  melange-build-base:
    needs: [discover, keygen]
    if: always() && needs.discover.outputs.base_packages != '[]' && needs.discover.outputs.base_packages != '[""]'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        name: ${{ fromJson(needs.discover.outputs.base_packages) }}
        arch: [x86_64, aarch64]

    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Install melange
        run: |
          go install chainguard.dev/melange@${{ env.MELANGE_VERSION }}
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Download ephemeral signing key (PR)
        if: github.event_name == 'pull_request'
        uses: actions/download-artifact@v4
        with:
          name: melange-ephemeral-key
          path: .

      - name: Setup signing key (protected branch)
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ env.MELANGE_SIGNING_KEY }}"     > melange.rsa
          echo "${{ env.MELANGE_SIGNING_KEY_PUB }}" > melange.rsa.pub
          chmod 600 melange.rsa

      - name: Build package with melange
        run: |
          chmod 600 melange.rsa
          melange build "${{ matrix.name }}/melange.yaml" \
            --arch "${{ matrix.arch }}" \
            --signing-key melange.rsa \
            --repository-append ./packages \
            --keyring-append ./melange.rsa.pub \
            --out-dir ./packages \
            --runner docker

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.name }}-${{ matrix.arch }}
          path: |
            packages/
            melange.rsa.pub
          retention-days: 1

  ##############################################################################
  # TIER 2: BUILD APP MELANGE PACKAGES (depends on base packages)              #
  ##############################################################################
  melange-build-app:
    needs: [discover, keygen, melange-build-base]
    if: always() && needs.discover.outputs.app_packages != '[]' && needs.discover.outputs.app_packages != '[""]' && (needs.melange-build-base.result == 'success' || needs.melange-build-base.result == 'skipped')
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        name: ${{ fromJson(needs.discover.outputs.app_packages) }}
        arch: [x86_64, aarch64]

    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Install melange
        run: |
          go install chainguard.dev/melange@${{ env.MELANGE_VERSION }}
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Download ephemeral signing key (PR)
        if: github.event_name == 'pull_request'
        uses: actions/download-artifact@v4
        with:
          name: melange-ephemeral-key
          path: .

      - name: Setup signing key (protected branch)
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ env.MELANGE_SIGNING_KEY }}"     > melange.rsa
          echo "${{ env.MELANGE_SIGNING_KEY_PUB }}" > melange.rsa.pub
          chmod 600 melange.rsa

      - name: Download base packages (same arch)
        uses: actions/download-artifact@v4
        with:
          pattern: packages-*-${{ matrix.arch }}
          merge-multiple: true
          path: .

      - name: Re-index local packages
        run: |
          chmod 600 melange.rsa
          if [ -d "packages/${{ matrix.arch }}" ]; then
            melange index --signing-key melange.rsa -o "packages/${{ matrix.arch }}/APKINDEX.tar.gz" "packages/${{ matrix.arch }}"/*.apk
          fi

      - name: Build package with melange
        run: |
          chmod 600 melange.rsa
          melange build "${{ matrix.name }}/melange.yaml" \
            --arch "${{ matrix.arch }}" \
            --signing-key melange.rsa \
            --repository-append ./packages \
            --keyring-append ./melange.rsa.pub \
            --out-dir ./packages \
            --runner docker

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.name }}-${{ matrix.arch }}
          path: |
            packages/
            melange.rsa.pub
          retention-days: 1

  ##############################################################################
  # FINAL TIER: BUILD ALL IMAGES (depends on all melange packages)             #
  ##############################################################################
  build-images:
    needs: [discover, melange-build-base, melange-build-app]
    if: always() && needs.discover.outputs.apko_images != '[]' && needs.discover.outputs.apko_images != '[""]' && (needs.melange-build-base.result == 'success' || needs.melange-build-base.result == 'skipped') && (needs.melange-build-app.result == 'success' || needs.melange-build-app.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 50
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        name: ${{ fromJson(needs.discover.outputs.apko_images) }}

    steps:
      - uses: actions/checkout@v4

      - name: Install apko
        run: |
          go install chainguard.dev/apko@${{ env.APKO_VERSION }}
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - uses: sigstore/cosign-installer@v4.1.0

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          pattern: packages-*-*
          merge-multiple: true
          path: .

      - name: Install melange
        run: |
          go install chainguard.dev/melange@${{ env.MELANGE_VERSION }}
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Setup signing key
        run: |
          # The pub key should already exist from artifacts.
          # For protected branches, also create it from secrets if missing.
          if [ ! -f "melange.rsa.pub" ] && [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "${{ env.MELANGE_SIGNING_KEY_PUB }}" > melange.rsa.pub
          fi
          # Private key needed for re-indexing
          if [ ! -f "melange.rsa" ] && [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "${{ env.MELANGE_SIGNING_KEY }}" > melange.rsa
            chmod 600 melange.rsa
          fi

      - name: Re-index local packages
        run: |
          if [ -f "melange.rsa" ]; then
            for arch in x86_64 aarch64; do
              if [ -d "packages/$arch" ]; then
                melange index --signing-key melange.rsa -o "packages/$arch/APKINDEX.tar.gz" "packages/$arch"/*.apk
              fi
            done
          fi

      - name: Build image with apko
        run: |
          ARGS=""
          if [ -f "melange.rsa.pub" ]; then
            ARGS="$ARGS --keyring-append ./melange.rsa.pub"
          fi
          if [ -d "./packages" ]; then
            ARGS="$ARGS --repository-append ./packages"
          fi

          apko build "${{ matrix.name }}/apko.yaml" \
            "${{ env.REGISTRY_NAMESPACE }}/${{ matrix.name }}:${{ github.sha }}" \
            "${{ matrix.name }}.tar" \
            --arch x86_64 \
            $ARGS

          docker load < "${{ matrix.name }}.tar"

      - name: Scan with Grype
        id: grype
        uses: anchore/scan-action@v6
        with:
          image: ${{ env.REGISTRY_NAMESPACE }}/${{ matrix.name }}:${{ github.sha }}
          output-format: sarif
          fail-build: false

      - name: Upload Grype SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: grype-${{ matrix.name }}

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY_NAMESPACE }}/${{ matrix.name }}:${{ github.sha }}
          format: sarif
          output: trivy-results-${{ matrix.name }}.sarif

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results-${{ matrix.name }}.sarif
          category: trivy-${{ matrix.name }}

      - name: Generate CVE report
        shell: bash
        env:
          REGISTRY: ${{ env.REGISTRY_NAMESPACE }}
          IMAGE_NAME: ${{ matrix.name }}
          VERSION: ${{ github.sha }}
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${PWD}":/work -w /work \
            anchore/grype:latest \
            "${REGISTRY}/${IMAGE_NAME}:${VERSION}" \
            -o json > "cve-report-${IMAGE_NAME}.json"

      - name: Upload CVE report artifact
        uses: actions/upload-artifact@v4
        with:
          name: cve-report-${{ matrix.name }}
          path: cve-report-${{ matrix.name }}.json
          retention-days: 90

      - name: Extract version
        id: version
        run: |
          set -euo pipefail
          if [ -f "${{ matrix.name }}/melange.yaml" ]; then
            PKG_VERSION=$(awk '/^  version:/ {print $2}' "${{ matrix.name }}/melange.yaml")
            PKG_EPOCH=$(awk '/^  epoch:/ {print $2}' "${{ matrix.name }}/melange.yaml")
            echo "tag=${PKG_VERSION}-r${PKG_EPOCH}" >> "$GITHUB_OUTPUT"
          else
            SBOM_FILE=$(find . -name "sbom-*.spdx.json" | head -1)
            if [ -z "$SBOM_FILE" ]; then
              echo "::error::No SBOM found and no melange.yaml for ${{ matrix.name }}"
              exit 1
            fi
            PRIMARY_PKG=$(awk '/^  packages:/{f=1;next} /^  [a-zA-Z]/{f=0} f' "${{ matrix.name }}/apko.yaml" | sed -nE 's/.*- ([a-zA-Z0-9_-]+).*/\1/p' | grep -v 'wolfi-baselayout' | grep -v 'ca-certificates' | head -1)
            VERSION=$(jq -r --arg pkg "${PRIMARY_PKG:-${{ matrix.name }}}" '.packages[] | select(.name == $pkg) | .versionInfo' "$SBOM_FILE" | head -1)
            if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
              VERSION=$(jq -r '.packages[] | select(.name != "wolfi-baselayout") | .versionInfo' "$SBOM_FILE" | head -1)
            fi
            echo "tag=$VERSION" >> "$GITHUB_OUTPUT"
            rm -f sbom-*.spdx.json
          fi

      - name: Publish image
        if: github.event_name != 'pull_request'
        run: |
          ARGS=""
          if [ -f "melange.rsa.pub" ]; then
            ARGS="$ARGS --keyring-append ./melange.rsa.pub"
          fi
          if [ -d "./packages" ]; then
            ARGS="$ARGS --repository-append ./packages"
          fi

          apko publish "${{ matrix.name }}/apko.yaml" \
            "${{ env.REGISTRY_NAMESPACE }}/${{ matrix.name }}:${{ steps.version.outputs.tag }}" \
            "${{ env.REGISTRY_NAMESPACE }}/${{ matrix.name }}:latest" \
            --arch x86_64,aarch64 \
            $ARGS

      - name: Sign image with cosign
        if: github.event_name != 'pull_request'
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: |
            cosign sign --yes \
              "${{ env.REGISTRY_NAMESPACE }}/${{ matrix.name }}:${{ steps.version.outputs.tag }}"

  ##############################################################################
  # SUMMARY                                                                    #
  ##############################################################################
  summary:
    needs: [build-images]
    runs-on: ubuntu-latest
    if: always()
    permissions: {}
    steps:
      - name: Check results
        run: |
          IMAGES="${{ needs.build-images.result }}"
          echo "build-images: $IMAGES"

          if [[ "$IMAGES" != "success" && "$IMAGES" != "skipped" ]]; then
            echo "::error::Image builds did not succeed (build-images=$IMAGES)"
            exit 1
          fi

  ##############################################################################
  # CLEANUP OLD VERSIONS                                                       #
  ##############################################################################
  cleanup:
    needs: [build-images]
    runs-on: ubuntu-latest
    if: always() && github.event_name != 'pull_request'
    permissions:
      packages: write
    steps:
      - name: Delete old untagged versions
        run: |
          gh api "/orgs/${{ github.repository_owner }}/packages?package_type=container" \
            --paginate --jq '.[].name' 2>/dev/null | \
          while read -r pkg; do
            echo "Cleaning old versions from $pkg..."
            gh api "/orgs/${{ github.repository_owner }}/packages/container/$pkg/versions" \
              --paginate --jq '[.[] | select(.metadata.container.tags | length == 0)] | sort_by(.created_at) | reverse | .[4:] | .[].id' 2>/dev/null | \
            while read -r id; do
              echo "  Deleting version $id"
              gh api --method DELETE "/orgs/${{ github.repository_owner }}/packages/container/$pkg/versions/$id" 2>/dev/null || true
            done
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
