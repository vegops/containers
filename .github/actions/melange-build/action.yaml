name: Melange build
description: Build, test and upload a melange package

inputs:
  package-name:
    description: Package directory name
    required: true
  arch:
    description: Target architecture
    required: true
  has-dependencies:
    description: Whether the package needs locally built dependencies
    required: false
    default: "false"
  event-name:
    description: Workflow event name
    required: true
  signing-key-secret:
    description: Private signing key for protected branches
    required: false
    default: ""
  signing-key-pub-secret:
    description: Public signing key for protected branches
    required: false
    default: ""
  melange-version:
    description: melange version to install
    required: true

runs:
  using: composite
  steps:
    - name: Install melange
      uses: chainguard-dev/actions/setup-melange@1fae06d54c372dad7ad8494f025ea8e878ddce91 # v1.6.12
      with:
        version: ${{ inputs.melange-version }}

    - name: Download ephemeral signing key (PR)
      if: ${{ inputs.event-name == 'pull_request' }}
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: melange-ephemeral-key
        path: .

    - name: Setup signing key (protected branch)
      if: ${{ inputs.event-name != 'pull_request' }}
      shell: bash
      run: |
        set -euo pipefail
        printf '%s\n' "${{ inputs.signing-key-secret }}" > melange.rsa
        printf '%s\n' "${{ inputs.signing-key-pub-secret }}" > melange.rsa.pub
        chmod 600 melange.rsa

    - name: Download base packages (same arch)
      if: ${{ inputs.has-dependencies == 'true' }}
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        pattern: packages-*-${{ inputs.arch }}
        merge-multiple: true
        path: .

    - name: Re-index local packages
      if: ${{ inputs.has-dependencies == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        chmod 600 melange.rsa
        if [ -d "packages/${{ inputs.arch }}" ] && compgen -G "packages/${{ inputs.arch }}/*.apk" > /dev/null; then
          melange index --signing-key melange.rsa -o "packages/${{ inputs.arch }}/APKINDEX.tar.gz" "packages/${{ inputs.arch }}"/*.apk
        fi

    - name: Build package with melange
      uses: chainguard-dev/actions/melange-build-pkg@1fae06d54c372dad7ad8494f025ea8e878ddce91 # v1.6.12
      with:
        config: melange.yaml
        archs: ${{ inputs.arch }}
        sign-with-key: true
        signing-key-path: ${{ github.workspace }}/melange.rsa
        repository-path: ${{ github.workspace }}/packages
        repository-append: ${{ github.workspace }}/packages
        keyring-append: ${{ github.workspace }}/melange.rsa.pub
        source-dir: ${{ github.workspace }}
        workdir: ${{ inputs.package-name }}

    - name: Run smoke tests
      shell: bash
      run: |
        set -euo pipefail
        sudo melange test "${{ inputs.package-name }}/melange.yaml" \
          --arch "${{ inputs.arch }}" \
          --repository-append ./packages \
          --keyring-append ./melange.rsa.pub

    - name: Upload packages
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: packages-${{ inputs.package-name }}-${{ inputs.arch }}
        path: |
          packages/
          melange.rsa.pub
        retention-days: 1
