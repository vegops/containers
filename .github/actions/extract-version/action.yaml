name: Resolve image publish metadata
description: Resolve OCI publish metadata for an image directory

inputs:
  package-name:
    description: Package directory name
    required: true

outputs:
  release_tag:
    description: Release tag
    value: ${{ steps.resolve.outputs.release_tag }}
  repository:
    description: Public repository name
    value: ${{ steps.resolve.outputs.repository }}
  publish_latest:
    description: Whether to publish the latest tag for this image
    value: ${{ steps.resolve.outputs.publish_latest }}
  version_source_package:
    description: Package name to read an exact version from the generated SBOM
    value: ${{ steps.resolve.outputs.version_source_package }}

runs:
  using: composite
  steps:
    - name: Resolve publish metadata
      id: resolve
      shell: bash
      run: |
        set -euo pipefail
        pkg="${{ inputs.package-name }}"
        publish_json="$pkg/publish.json"

        repository="$pkg"
        publish_latest='true'
        version_source_package=''
        release_tag=''

        if [ -f "$publish_json" ]; then
          repository=$(jq -r '.repository // empty' "$publish_json")
          if [ -z "$repository" ]; then
            repository="$pkg"
          fi
          publish_latest=$(jq -r 'if has("publishLatest") then .publishLatest else true end' "$publish_json")
          version_source_package=$(jq -r '.versionSourcePackage // ""' "$publish_json")
        fi

        if [ -f "$pkg/melange.yaml" ]; then
          pkg_version=$(awk '/^  version:/ {print $2; exit}' "$pkg/melange.yaml" | tr -d '"')
          pkg_epoch=$(awk '/^  epoch:/ {print $2; exit}' "$pkg/melange.yaml")
          release_tag="${pkg_version}-r${pkg_epoch}"
        elif [ -z "$version_source_package" ]; then
          release_tag='latest'
        fi

        echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
        echo "repository=$repository" >> "$GITHUB_OUTPUT"
        echo "publish_latest=$publish_latest" >> "$GITHUB_OUTPUT"
        echo "version_source_package=$version_source_package" >> "$GITHUB_OUTPUT"
