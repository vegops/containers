name: Scan image
description: Run vulnerability scans for a built image tarball and upload reports

inputs:
  image-tar:
    description: Path to the image tarball
    required: true
  image-name:
    description: Image name used for artifact naming
    required: true
  arch:
    description: Target architecture
    required: true
  repository:
    description: Public repository name used for publishing and dashboard grouping
    required: true
  release-tag:
    description: Exact release tag for this build
    required: true
  stream-tag:
    description: Stream tag used to group related releases, such as a major version
    required: false
  published-tags-json:
    description: JSON array of all tags published for the image digest
    required: true
  sbom-path:
    description: Path to the renamed SBOM file for this architecture
    required: true

runs:
  using: composite
  steps:
    - name: Scan with Grype (SARIF)
      id: grype-sarif
      uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
      with:
        image: docker-archive:./${{ inputs.image-tar }}
        output-format: sarif
        fail-build: false

    - name: Scan with Grype (JSON)
      id: grype-json
      uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
      with:
        image: docker-archive:./${{ inputs.image-tar }}
        output-format: json
        fail-build: false

    - name: Rename Grype JSON report
      shell: bash
      run: |
        set -euo pipefail
        mv "${{ steps.grype-json.outputs.json }}" "cve-report-${{ inputs.image-name }}-${{ inputs.arch }}.json"

    - name: Add VegOps scan metadata
      shell: bash
      run: |
        set -euo pipefail
        tmpfile="$(mktemp)"
        jq \
          --arg source_image "${{ inputs.image-name }}" \
          --arg repository "${{ inputs.repository }}" \
          --arg release_tag "${{ inputs.release-tag }}" \
          --arg stream_tag "${{ inputs.stream-tag }}" \
          --arg arch "${{ inputs.arch }}" \
          --argjson published_tags '${{ inputs.published-tags-json }}' \
          '
            .vegops = {
              sourceImage: $source_image,
              repository: $repository,
              releaseTag: $release_tag,
              streamTag: (if $stream_tag == "" then null else $stream_tag end),
              arch: $arch,
              publishedTags: $published_tags
            }
          ' \
          "cve-report-${{ inputs.image-name }}-${{ inputs.arch }}.json" > "$tmpfile"
        mv "$tmpfile" "cve-report-${{ inputs.image-name }}-${{ inputs.arch }}.json"

    - name: Upload Grype SARIF
      uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
      with:
        sarif_file: ${{ steps.grype-sarif.outputs.sarif }}
        category: grype-${{ inputs.image-name }}-${{ inputs.arch }}

    - name: Scan with Trivy
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
      with:
        input: ./${{ inputs.image-tar }}
        format: sarif
        output: trivy-results-${{ inputs.image-name }}-${{ inputs.arch }}.sarif

    - name: Upload Trivy SARIF
      uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
      with:
        sarif_file: trivy-results-${{ inputs.image-name }}-${{ inputs.arch }}.sarif
        category: trivy-${{ inputs.image-name }}-${{ inputs.arch }}

    - name: Upload CVE report artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: cve-report-${{ inputs.image-name }}-${{ inputs.arch }}
        path: cve-report-${{ inputs.image-name }}-${{ inputs.arch }}.json
        retention-days: 90

    - name: Upload SBOM artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: sbom-${{ inputs.image-name }}-${{ inputs.arch }}
        path: ${{ inputs.sbom-path }}
        retention-days: 90
