contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    # Base filesystem
    - wolfi-baselayout

    # SQLite CLI from Wolfi (CVE-patched)
    - sqlite
    - sqlite-libs

    # Core system libraries
    - glibc
    - ld-linux
    - libgcc

    # SQLite runtime dependencies
    - zlib
    - readline
    - ncurses
    - ncurses-terminfo-base

    # Certificates for HTTPS
    - ca-certificates-bundle

    # Timezone data
    - tzdata

accounts:
  groups:
    - groupname: nonroot
      gid: 65532
  users:
    - username: nonroot
      uid: 65532
      gid: 65532
  run-as: "65532"

entrypoint:
  command: /usr/bin/sqlite3

work-dir: /

volumes:
  - /sqlite/var

paths:
  - path: /sqlite
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /sqlite/var
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /tmp
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o1777

annotations:
  org.opencontainers.image.title: "sqlite"
  org.opencontainers.image.description: "Hardened SQLite image built on Wolfi with daily CVE patches"
  org.opencontainers.image.url: "https://github.com/vegops/containers"
  org.opencontainers.image.source: "https://github.com/vegops/containers/tree/main/sqlite"
  org.opencontainers.image.licenses: "Apache-2.0"

archs:
  - x86_64
  - aarch64

layering:
  strategy: origin
