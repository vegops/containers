contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-baselayout
    - ca-certificates-bundle
    - nginx-mainline
    - tzdata
    - bentopdf

accounts:
  groups:
    - groupname: nonroot
      gid: 65532
  users:
    - username: nonroot
      uid: 65532
      gid: 65532
  run-as: "65532"

entrypoint:
  command: >-
    /usr/sbin/nginx
      -c /usr/share/bentopdf/nginx.conf
      -e stderr
      -g "daemon off;"

work-dir: /

paths:
  - path: /bentopdf
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /bentopdf/cache
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /bentopdf/cache/client_body
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /bentopdf/cache/fastcgi
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /bentopdf/cache/proxy
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /bentopdf/cache/scgi
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /bentopdf/cache/uwsgi
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /bentopdf/run
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700

annotations:
  org.opencontainers.image.title: "bentopdf"
  org.opencontainers.image.description: "Hardened BentoPDF image built on Wolfi with daily CVE patches"
  org.opencontainers.image.url: "https://github.com/vegops/containers"
  org.opencontainers.image.source: "https://github.com/vegops/containers/tree/main/bentopdf"
  org.opencontainers.image.licenses: "AGPL-3.0-only"

archs:
  - x86_64
  - aarch64

layering:
  strategy: origin
