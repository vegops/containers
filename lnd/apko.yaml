contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-baselayout
    - ca-certificates-bundle
    - tzdata
    - lnd

accounts:
  groups:
    - groupname: nonroot
      gid: 65532
  users:
    - username: nonroot
      uid: 65532
      gid: 65532
  run-as: "65532"

entrypoint:
  command: /usr/bin/entrypoint

work-dir: /

volumes:
  - /lnd/etc
  - /lnd/var

paths:
  - path: /lnd
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /lnd/etc
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /lnd/var
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700

annotations:
  org.opencontainers.image.title: "lnd"
  org.opencontainers.image.description: "Hardened lnd image built on Wolfi with daily CVE patches"
  org.opencontainers.image.url: "https://github.com/vegops/containers"
  org.opencontainers.image.source: "https://github.com/vegops/containers/tree/main/lnd"
  org.opencontainers.image.licenses: "MIT"

archs:
  - x86_64
  - aarch64

layering:
  strategy: origin
