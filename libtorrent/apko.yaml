contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - libtorrent

accounts:
  groups:
    - groupname: nonroot
      gid: 65532
  users:
    - username: nonroot
      uid: 65532
      gid: 65532
  run-as: "65532"

annotations:
  org.opencontainers.image.title: "libtorrent"
  org.opencontainers.image.description: "Hardened libtorrent-rasterbar static library built on Wolfi"
  org.opencontainers.image.url: "https://github.com/vegops/containers"
  org.opencontainers.image.source: "https://github.com/vegops/containers/tree/main/libtorrent"
  org.opencontainers.image.licenses: "BSD-1-Clause"

archs:
  - x86_64
  - aarch64
