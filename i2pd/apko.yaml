contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-baselayout
    - ca-certificates-bundle
    - boost
    - miniupnpc
    - openssl
    - zlib
    - tzdata
    - i2pd

accounts:
  groups:
    - groupname: nonroot
      gid: 65532
  users:
    - username: nonroot
      uid: 65532
      gid: 65532
  run-as: "65532"

work-dir: /

entrypoint:
  command: /usr/bin/entrypoint

cmd: >-
  --sam.enabled=true
  --sam.address=0.0.0.0
  --sam.port=7656
  --upnp.enabled=false

volumes:
  - /i2pd/etc
  - /i2pd/var

paths:
  - path: /i2pd
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /i2pd/etc
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /i2pd/var
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700

annotations:
  org.opencontainers.image.title: "i2pd"
  org.opencontainers.image.description: "Hardened i2pd image built on Wolfi with daily CVE patches"
  org.opencontainers.image.url: "https://github.com/vegops/containers"
  org.opencontainers.image.source: "https://github.com/vegops/containers/tree/main/i2pd"
  org.opencontainers.image.licenses: "BSD-3-Clause"

archs:
  - x86_64
  - aarch64

layering:
  strategy: origin
