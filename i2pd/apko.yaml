contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-baselayout
    - ca-certificates-bundle
    - boost
    - miniupnpc
    - openssl
    - zlib
    - i2pd

accounts:
  groups:
    - groupname: i2pd
      gid: 65532
  users:
    - username: i2pd
      uid: 65532
      gid: 65532
  run-as: 65532

entrypoint:
  command: /usr/bin/i2pd

cmd: >-
  --service
  --datadir=/var/lib/i2pd
  --certsdir=/usr/share/i2pd/certificates
  --conf=/etc/i2pd/i2pd.conf
  --tunconf=/etc/i2pd/tunnels.conf
  --sam.enabled=true
  --sam.address=0.0.0.0
  --sam.port=7656
  --upnp.enabled=false

paths:
  - path: /var/lib/i2pd
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /var/log/i2pd
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755

annotations:
  org.opencontainers.image.title: "i2pd"
  org.opencontainers.image.description: "Hardened i2pd builder image built on Wolfi with daily CVE patches"
  org.opencontainers.image.url: "https://github.com/vegops/containers"
  org.opencontainers.image.source: "https://github.com/vegops/containers/tree/main/i2pd"
  org.opencontainers.image.licenses: "BSD-3-Clause"

archs:
  - x86_64
  - aarch64
