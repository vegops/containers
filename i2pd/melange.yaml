package:
  name: i2pd
  version: 2.60.0 # renovate: datasource=github-tags depName=PurpleI2P/i2pd
  epoch: 1
  description: I2P daemon
  copyright:
    - license: BSD-3-Clause

environment:
  contents:
    repositories:
      - &wolfi-repository https://packages.wolfi.dev/os
    keyring:
      - &wolfi-keyring https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    packages:
      - busybox
      - build-base
      - boost-dev
      - miniupnpc-dev
      - openssl-dev
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/PurpleI2P/i2pd
      tag: ${{package.version}}

  - runs: |
      make USE_UPNP=yes -j$(nproc)
      install -Dm755 i2pd "${{targets.destdir}}/usr/bin/i2pd"
      install -Dm644 contrib/docker/i2pd-docker.conf "${{targets.destdir}}/usr/share/i2pd/i2pd.conf"

      mkdir -p "${{targets.destdir}}/i2pd"
      cp -r contrib/certificates "${{targets.destdir}}/i2pd/certificates"

      # Patch default config for container use: log to stdout, errors only
      sed -e 's/^log = file/log = stdout/' \
          -e 's/^loglevel = none/loglevel = error/' \
          "${{targets.destdir}}/usr/share/i2pd/i2pd.conf" > _
      mv -f _ "${{targets.destdir}}/usr/share/i2pd/i2pd.conf"

  - uses: dotnet/entrypoint

  - uses: strip

update:
  enabled: true
  github:
    identifier: PurpleI2P/i2pd
    use-tag: true
    tag-filter-prefix: 2.59.

test:
  environment:
    contents:
      repositories:
        - *wolfi-repository
      keyring:
        - *wolfi-keyring
      packages:
        - apk-tools
        - busybox
        - posix-libc-utils
        - ${{package.name}}=${{package.full-version}}
  pipeline:
    - name: Basic i2pd command test
      runs: |
        i2pd --version
        entrypoint --version
