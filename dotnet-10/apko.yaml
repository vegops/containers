contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-baselayout
    - dotnet-10-runtime
    - glibc
    - glibc-locale-posix
    - ld-linux
    - libgcc
    - libstdc++
    - icu
    - libunwind
    - lttng-ust
    - libxcrypt
    - libssl3
    - libcrypto3
    - ca-certificates-bundle
    - tzdata
    - zlib
    - xz

accounts:
  groups:
    - groupname: nonroot
      gid: 65532
  users:
    - username: nonroot
      uid: 65532
      gid: 65532
  run-as: "65532"

entrypoint:
  command: /usr/bin/dotnet

work-dir: /app

environment:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  # Enable globalization invariant mode if ICU issues occur
  # DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "1"
  LANG: C.UTF-8
  PATH: /usr/bin:/bin
  DOTNET_RUNNING_IN_CONTAINER: "true"

paths:
  - path: /app
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /tmp
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o1777

annotations:
  org.opencontainers.image.title: "dotnet"
  org.opencontainers.image.description: "Hardened .NET Runtime image built on Wolfi with daily CVE patches"
  org.opencontainers.image.url: "https://github.com/vegops/containers"
  org.opencontainers.image.source: "https://github.com/vegops/containers/tree/main/dotnet-10"
  org.opencontainers.image.licenses: "Apache-2.0"

archs:
  - x86_64
  - aarch64

layering:
  strategy: origin
