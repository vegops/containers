contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-baselayout
    - ca-certificates-bundle
    - adguard

accounts:
  groups:
    - groupname: nonroot
      gid: 65532
  users:
    - username: nonroot
      uid: 65532
      gid: 65532
  run-as: "65532"

entrypoint:
  command: /usr/bin/AdGuardHome

cmd: --config /adguard/etc/config.yaml --pidfile /adguard/run/adguard.pid --work-dir /adguard/var --no-check-update

work-dir: /adguard/var

environment:
  HOME: /adguard/var
  TZ: UTC

volumes:
  - /adguard/etc
  - /adguard/var

paths:
  - path: /adguard/etc
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /adguard/var
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /adguard/run
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700

annotations:
  org.opencontainers.image.title: "adguard"
  org.opencontainers.image.description: "Hardened AdGuard Home image built on Wolfi with daily CVE patches"
  org.opencontainers.image.url: "https://github.com/vegops/containers"
  org.opencontainers.image.source: "https://github.com/vegops/containers/tree/main/adguard"
  org.opencontainers.image.licenses: "GPL-3.0-only"

archs:
  - x86_64
  - aarch64
