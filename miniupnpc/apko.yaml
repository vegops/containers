contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-baselayout
    - ca-certificates-bundle
    - tzdata
    - miniupnpc

accounts:
  groups:
    - groupname: nonroot
      gid: 65532
  users:
    - username: nonroot
      uid: 65532
      gid: 65532
  run-as: "65532"

work-dir: /

entrypoint:
  command: /usr/bin/upnpc

cmd: --version

annotations:
  org.opencontainers.image.title: "miniupnpc"
  org.opencontainers.image.description: "Hardened miniupnpc image built on Wolfi with daily CVE patches"
  org.opencontainers.image.url: "https://github.com/vegops/containers"
  org.opencontainers.image.source: "https://github.com/vegops/containers/tree/main/miniupnpc"
  org.opencontainers.image.licenses: "BSD-3-Clause"

archs:
  - x86_64
  - aarch64

layering:
  strategy: origin
