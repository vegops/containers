contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-baselayout
    - ca-certificates-bundle
    - qt-minimal

accounts:
  groups:
    - groupname: nonroot
      gid: 65532
  users:
    - username: nonroot
      uid: 65532
      gid: 65532
  run-as: "65532"

entrypoint:
  command: /usr/bin/qmake

cmd: --version

environment:
  LANG: C.UTF-8

annotations:
  org.opencontainers.image.title: "qt-minimal"
  org.opencontainers.image.description: "Hardened qt-minimal builder image built on Wolfi with daily CVE patches"
  org.opencontainers.image.url: "https://github.com/vegops/containers"
  org.opencontainers.image.source: "https://github.com/vegops/containers/tree/main/qt-minimal"
  org.opencontainers.image.licenses: "LGPL-3.0"

archs:
  - x86_64
  - aarch64
