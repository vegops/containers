package:
  name: qt-minimal
  version: 6.11.1
  epoch: 1
  description: Minimal Qt 6
  copyright:
    - license: LGPL-3.0

environment:
  contents:
    repositories:
      - &wolfi-repository https://packages.wolfi.dev/os
    keyring:
      - &wolfi-keyring https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    packages:
      - build-base
      - busybox
      - linux-headers
      - mesa-dev
      - openssl-static
      - perl

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/qt/qtbase
      tag: v${{package.version}}

  - runs: |
      mkdir -p output
      cd output
      ../configure \
        -static \
        -release \
        -prefix /usr \
        -c++std c++17 \
        -nomake tests \
        -nomake examples \
        -no-feature-testlib \
        -no-gui \
        -no-dbus \
        -no-widgets \
        -no-feature-animation \
        -no-feature-libresolv \
        -openssl \
        -openssl-linked \
        -optimize-size \
        -feature-optimize_full

  - uses: cmake/build
    with:
      opts: --parallel $(nproc)

  - uses: cmake/install

  - name: Clean up build artifacts and install files on build environment
    runs: |
      cmake --install output
      find . -mindepth 1 -maxdepth 1 ! -name melange-out -exec rm -rf {} +
      mkdir output

  - uses: git-checkout
    with:
      repository: https://github.com/qt/qttools
      branch: v${{package.version}}
      depth: "1"

  - uses: cmake/configure
    with:
      opts: |
        -Wno-dev \
        -DCMAKE_BUILD_TYPE=Release \
        -DCMAKE_INSTALL_PREFIX=/usr \
        -DCMAKE_CXX_STANDARD=17 \
        -DCMAKE_PREFIX_PATH=/usr \
        -DCMAKE_EXE_LINKER_FLAGS="-static" \
        -DBUILD_SHARED_LIBS=OFF

  - uses: cmake/build
    with:
      opts: --parallel $(nproc)

  - uses: cmake/install

  - uses: strip

update:
  enabled: true
  github:
    identifier: qt/qtbase
    use-tag: true
    strip-prefix: v

test:
  environment:
    contents:
      repositories:
        - *wolfi-repository
      keyring:
        - *wolfi-keyring
      packages:
        - apk-tools
        - busybox
        - posix-libc-utils
        - ${{package.name}}=${{package.full-version}}
  pipeline:
    - name: Basic test
      runs: |
        qmake --version >/dev/null 2>&1 || \
        qmake --help >/dev/null 2>&1
