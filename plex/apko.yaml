contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-baselayout
    - ca-certificates-bundle
    - libcrypto3
    - libssl3
    - tzdata
    - plex

accounts:
  groups:
    - groupname: nonroot
      gid: 65532
  users:
    - username: nonroot
      uid: 65532
      gid: 65532
  run-as: "65532"

entrypoint:
  command: /usr/bin/entrypoint

work-dir: /

environment:
  HOME: /plex/etc
  NVIDIA_DRIVER_CAPABILITIES: compute,video,utility,graphics
  PLEX_MEDIA_SERVER_APPLICATION_SUPPORT_DIR: /plex/etc/Library/Application Support
  PLEX_MEDIA_SERVER_HOME: /usr/lib/plexmediaserver
  PLEX_MEDIA_SERVER_INFO_VENDOR: Docker
  PLEX_MEDIA_SERVER_INFO_DEVICE: Container
  PLEX_MEDIA_SERVER_MAX_PLUGIN_PROCS: "6"
  PLEX_STDOUT_LOG_LEVEL: "WARN"
  TMPDIR: /plex/tmp

volumes:
  - /plex/etc

paths:
  - path: /plex
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /plex/etc
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /plex/etc/Library
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /plex/etc/Library/Application Support
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /plex/tmp
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /tmp
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o1777

annotations:
  org.opencontainers.image.title: "plex"
  org.opencontainers.image.description: "Hardened Plex Media Server image built on Wolfi with daily CVE patches"
  org.opencontainers.image.url: "https://github.com/vegops/containers"
  org.opencontainers.image.source: "https://github.com/vegops/containers/tree/main/plex"
  org.opencontainers.image.licenses: "LicenseRef-Plex-EULA"

archs:
  - x86_64
  - aarch64

layering:
  strategy: origin
