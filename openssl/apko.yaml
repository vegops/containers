contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-baselayout
    - ca-certificates-bundle
    - tzdata
    - openssl

accounts:
  groups:
    - groupname: nonroot
      gid: 65532
  users:
    - username: nonroot
      uid: 65532
      gid: 65532
  run-as: "65532"

entrypoint:
  command: /usr/bin/openssl

cmd: version

work-dir: /

annotations:
  org.opencontainers.image.title: "openssl"
  org.opencontainers.image.description: "Hardened openssl image built on Wolfi with daily CVE patches"
  org.opencontainers.image.url: "https://github.com/vegops/containers"
  org.opencontainers.image.source: "https://github.com/vegops/containers/tree/main/openssl"
  org.opencontainers.image.licenses: "Apache-2.0"

archs:
  - x86_64
  - aarch64

layering:
  strategy: origin
