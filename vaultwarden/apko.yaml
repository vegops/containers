contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-baselayout
    - ca-certificates-bundle
    - libpq-18
    - libssl3
    - mariadb-connector-c
    - sqlite-libs
    - tzdata
    - vaultwarden

accounts:
  groups:
    - groupname: nonroot
      gid: 65532
  users:
    - username: nonroot
      uid: 65532
      gid: 65532
  run-as: "65532"

entrypoint:
  command: /usr/bin/vaultwarden

work-dir: /

environment:
  ROCKET_PORT: "80"
  ROCKET_ADDRESS: 0.0.0.0
  ROCKET_PROFILE: release
  DATA_FOLDER: /vaultwarden/var
  WEB_VAULT_FOLDER: /vaultwarden/web-vault

volumes:
  - /vaultwarden/var

paths:
  - path: /vaultwarden/var
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /tmp
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o1777

annotations:
  org.opencontainers.image.title: "vaultwarden"
  org.opencontainers.image.description: "Hardened Vaultwarden image built on Wolfi with daily CVE patches"
  org.opencontainers.image.url: "https://github.com/vegops/containers"
  org.opencontainers.image.source: "https://github.com/vegops/containers/tree/main/vaultwarden"
  org.opencontainers.image.licenses: "AGPL-3.0-only"

archs:
  - x86_64
  - aarch64

layering:
  strategy: origin
