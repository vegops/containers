contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-baselayout
    - ca-certificates-bundle
    - git
    - nodejs-22-minimal
    - tzdata
    - configarr

accounts:
  groups:
    - groupname: nonroot
      gid: 65532
  users:
    - username: nonroot
      uid: 65532
      gid: 65532
  run-as: "65532"

entrypoint:
  command: /usr/bin/entrypoint

work-dir: /

volumes:
  - /configarr/etc
  - /configarr/var

environment:
  NODE_ENV: production
  CONFIGARR_VERSION: v1.28.0 # renovate: datasource=github-releases depName=raydak-labs/configarr

paths:
  - path: /configarr
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /configarr/etc
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /configarr/var
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /configarr/run
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /tmp
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o1777

annotations:
  org.opencontainers.image.title: "configarr"
  org.opencontainers.image.description: "Hardened configarr image built on Wolfi with daily CVE patches"
  org.opencontainers.image.url: "https://github.com/vegops/containers"
  org.opencontainers.image.source: "https://github.com/vegops/containers/tree/main/configarr"
  org.opencontainers.image.licenses: "AGPL-3.0"

archs:
  - x86_64
  - aarch64

layering:
  strategy: origin
