package:
  name: qbittorrent
  version: 5.1.4 # renovate: datasource=github-tags depName=qbittorrent/qBittorrent
  epoch: 0
  description: qBittorrent BitTorrent client
  copyright:
    - license: GPL-2.0-only

vars:
  vuetorrent-version: 2.32.1 # renovate: datasource=github-releases depName=VueTorrent/VueTorrent

environment:
  environment:
    LANG: C.UTF-8
    QT_BASE_DIR: "/usr"
    LD_LIBRARY_PATH: "/usr/lib"
    DOTNET_NOLOGO: "true"
    DOTNET_GENERATE_ASPNET_CERTIFICATE: "0"
  contents:
    repositories:
      - &wolfi-repository https://packages.wolfi.dev/os
    keyring:
      - &wolfi-keyring https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    packages:
      - boost-dev
      - build-base
      - busybox
      - clang-18
      - cmake
      - curl
      - dotnet-10-sdk
      - git
      - jq
      - libtorrent
      - linux-headers
      - pkgconf
      - qt-minimal
      - samurai
      - sqlite-dev
      - unzip
      - openssl-static
      - zlib-dev
      - zlib-static

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/qbittorrent/qBittorrent
      tag: release-${{package.version}}

  - name: Download VueTorrent
    runs: |
      vuetorrent_json="$(curl -fsSL "https://api.github.com/repos/VueTorrent/VueTorrent/releases/tags/v${{vars.vuetorrent-version}}")"
      vuetorrent_url="$(printf '%s' "${vuetorrent_json}" | jq -r '.assets[] | select(.name == "vuetorrent.zip") | .browser_download_url')"
      vuetorrent_digest="$(printf '%s' "${vuetorrent_json}" | jq -r '.assets[] | select(.name == "vuetorrent.zip") | .digest | sub("^sha256:"; "")')"

      curl -fsSL "${vuetorrent_url}" -o vuetorrent.zip
      echo "${vuetorrent_digest}  vuetorrent.zip" | sha256sum -c -

      unzip -q vuetorrent.zip

  - name: Patch qBittorrent sources
    runs: |
      # Allow peer ID and user agent override via environment variables
      sed -i 's/lt::generate_fingerprint(PEER_ID, QBT_VERSION_MAJOR, QBT_VERSION_MINOR, QBT_VERSION_BUGFIX, QBT_VERSION_BUILD);/getenv("QBITTORRENT_PEER_ID") ? getenv("QBITTORRENT_PEER_ID") : lt::generate_fingerprint(PEER_ID, QBT_VERSION_MAJOR, QBT_VERSION_MINOR, QBT_VERSION_BUGFIX, QBT_VERSION_BUILD);/' src/base/bittorrent/sessionimpl.cpp
      sed -i 's|const auto USER_AGENT = QStringLiteral("qBittorrent/" QBT_VERSION_2);|const char *envUserAgent = getenv("QBITTORRENT_USER_AGENT"); const auto USER_AGENT = envUserAgent ? QString::fromUtf8(envUserAgent) : QStringLiteral("qBittorrent/" QBT_VERSION_2);|' src/base/bittorrent/sessionimpl.cpp
      sed -i '1s/^/#include <stdlib.h>\n/' src/base/bittorrent/sessionimpl.cpp

  - uses: cmake/configure
    with:
      opts: |
        -Wno-dev \
        -DQT6=ON \
        -DGUI=OFF \
        -DSTACKTRACE=OFF \
        -DBUILD_SHARED_LIBS=OFF \
        -DCMAKE_PREFIX_PATH="/usr" \
        -DCMAKE_BUILD_TYPE="Release" \
        -DCMAKE_CXX_STANDARD="17" \
        -DCMAKE_EXE_LINKER_FLAGS="-static" \
        -DOPENSSL_USE_STATIC_LIBS=TRUE \
        -DOPENSSL_ROOT_DIR="/usr" \
        -DOPENSSL_INCLUDE_DIR="/usr/include" \
        -DOPENSSL_SSL_LIBRARY="/usr/lib/libssl.a" \
        -DOPENSSL_CRYPTO_LIBRARY="/usr/lib/libcrypto.a" \
        -DZLIB_INCLUDE_DIR="/usr/include" \
        -DZLIB_LIBRARY="/usr/lib/libz.a"

  - uses: cmake/build

  - uses: cmake/install

  - runs: |
      mv "${{targets.destdir}}/usr/bin/qbittorrent-nox" "${{targets.destdir}}/usr/bin/qbittorrent"
      rm -rf "${{targets.destdir}}/usr/share/man"

  - name: Build entrypoint (Native AOT)
    runs: |
      arch="$(uname -m | sed 's/aarch64/arm64/;s/x86_64/x64/')"
      dotnet publish entrypoint.cs -c Release -r "linux-${arch}" -o .

  - name: Install artifacts
    runs: |
      install -Dm755 entrypoint "${{targets.destdir}}/usr/bin/entrypoint"
      install -Dm644 qBittorrent.conf "${{targets.destdir}}/usr/share/qbittorrent/qBittorrent.conf"
      mkdir -p "${{targets.destdir}}/qbittorrent/themes"
      cp -a vuetorrent "${{targets.destdir}}/qbittorrent/themes/vuetorrent"

      mkdir -p "${{targets.destdir}}/opt/qBittorrent/logs"
      ln -sf /qbittorrent/etc   "${{targets.destdir}}/opt/qBittorrent/config"
      ln -sf /qbittorrent/var   "${{targets.destdir}}/opt/qBittorrent/data"
      ln -sf /qbittorrent/cache "${{targets.destdir}}/opt/qBittorrent/cache"
      ln -sf /dev/stdout        "${{targets.destdir}}/opt/qBittorrent/logs/qbittorrent.log"

  - name: Clean up dotnet runfile mode
    runs: |
      rm -rf .local

  - uses: strip

update:
  enabled: true
  github:
    identifier: qbittorrent/qBittorrent
    use-tag: true
    tag-filter-prefix: release-5.1.
    strip-prefix: release-

test:
  environment:
    contents:
      repositories:
        - *wolfi-repository
      keyring:
        - *wolfi-keyring
      packages:
        - apk-tools
        - busybox
        - ${{package.name}}=${{package.full-version}}
  pipeline:
    - name: Basic qBittorrent command test
      runs: |
        qbittorrent --version >/dev/null 2>&1 || \
        qbittorrent --help >/dev/null 2>&1
