contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-baselayout
    - ca-certificates-bundle
    - libcrypto3
    - libssl3
    - tzdata
    - qbittorrent

accounts:
  groups:
    - groupname: nonroot
      gid: 65532
  users:
    - username: nonroot
      uid: 65532
      gid: 65532
  run-as: "65532"

entrypoint:
  command: >-
    /usr/bin/entrypoint
      --profile=/opt

work-dir: /

environment:
  LANG: C.UTF-8
  HOME: /qbittorrent

paths:
  - path: /qbittorrent
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /qbittorrent/etc
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /qbittorrent/var
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /qbittorrent/cache
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /qbittorrent/themes
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /tmp
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o1777

annotations:
  org.opencontainers.image.title: "qbittorrent"
  org.opencontainers.image.description: "Hardened qBittorrent image built on Wolfi with daily CVE patches"
  org.opencontainers.image.url: "https://github.com/vegops/containers"
  org.opencontainers.image.source: "https://github.com/vegops/containers/tree/main/qbittorrent"
  org.opencontainers.image.licenses: "GPL-2.0-only"

archs:
  - x86_64
  - aarch64

layering:
  strategy: origin
